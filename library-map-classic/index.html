/* ── HERO ── */
.hero{
  background:linear-gradient(160deg,var(--ink) 0%,var(--ink2) 45%,#2a1c0a 100%);
  color:var(--parch);padding:60px 24px 52px;text-align:center;
  position:relative;overflow:hidden;border-bottom:3px solid var(--gold);
}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(184,144,10,.1) 0%,transparent 70%);}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
.hero-shelf{font-family:var(--mono);font-size:.58rem;color:var(--gold3);letter-spacing:.28em;margin-bottom:14px;opacity:.65;position:relative;}
.hero-title{font-family:var(--serif);font-size:clamp(1.8rem,5vw,2.9rem);font-weight:700;line-height:1.2;color:var(--parch);text-shadow:0 2px 20px rgba(212,170,34,.15);position:relative;margin-bottom:18px;}
.hero-lead{font-size:.9rem;color:var(--parch3);font-weight:300;line-height:2;position:relative;max-width:520px;margin:0 auto;}

/* ── LIBRARY MAP (from library-map.js) ── */
.library-map-wrap{
  max-width:100%;margin:0 auto;
  border-top:1px solid rgba(184,144,10,.2);
  border-bottom:1px solid rgba(184,144,10,.2);
  background:#0a0804;
  position:relative;
  display:flex;justify-content:center;
  overflow:hidden;
}
.library-map-wrap canvas{
  width:100%;max-width:1400px;height:auto;display:block;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  cursor:pointer;
}
.map-room-info{
  max-width:1200px;margin:12px auto 0;padding:0 24px;
  min-height:60px;transition:opacity .3s;opacity:0;
}
.map-room-info-inner{
  background:rgba(26,18,8,.6);
  border:1px solid rgba(184,144,10,.18);
  padding:14px 18px;text-align:center;
}
.map-room-name{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--parch);margin-bottom:4px;}
.map-room-name-en{font-family:var(--mono);font-size:.55rem;color:var(--gold3);opacity:.55;margin-left:8px;letter-spacing:.08em;}
.map-room-desc{font-family:var(--jp);font-size:.75rem;color:var(--parch4);line-height:1.7;margin-bottom:10px;}
.map-room-btn{display:inline-block;font-family:var(--mono);font-size:.6rem;color:var(--gold3);letter-spacing:.1em;padding:6px 18px;border:1px solid rgba(184,144,10,.25);background:rgba(184,144,10,.06);text-decoration:none;cursor:pointer;transition:all .2s;}
.map-room-btn:hover{background:rgba(184,144,10,.14);border-color:rgba(184,144,10,.45);color:var(--gold4);}
.map-room-btn.disabled{opacity:.4;cursor:default;border-color:rgba(184,144,10,.1);}
