  <h1 class="chapter-title">ブレトンウッズ体制とニクソン・ショック</h1>
</div>

<p>第二次世界大戦後の1944年、連合国はブレトンウッズ体制を構築した。ドルだけが金と交換可能（1オンス＝35ドル）で、各国通貨はドルに固定される「金ドル本位制」だ。</p>
      <p>この体制は四半世紀にわたって世界経済の安定を支えた。しかしアメリカのベトナム戦争の戦費膨張と対外赤字の拡大により、ドルの信認が揺らぐ。</p>
      <p>1971年8月15日、ニクソン大統領はドルと金の交換を一方的に停止した。「ニクソン・ショック」だ。</p>
      <p>これにより、人類史上初めて、主要通貨のどれもが金の裏付けを持たない時代が始まった。</p>
