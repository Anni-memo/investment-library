<p><strong>金融緊急措置令</strong> — 1946年2月に発令された、預金封鎖と新円切替を定めた緊急勅令</p>
      <p><strong>預金封鎖</strong> — 金融機関の預金引き出しを制限・禁止する措置</p>
      <p><strong>新円切替</strong> — 旧紙幣を無効化し、新紙幣に強制的に切り替えた通貨改革</p>
      <p><strong>財産税</strong> — 個人の全資産に対して最高90%の累進税率で課税された臨時税</p>
      <p><strong>インフレーション</strong> — 物価が持続的に上昇し、通貨の購買力が低下する現象</p>
      <p><strong>旧円</strong> — 新円切替により無効化された、切替前の日本銀行券</p>
      <p><strong>封鎖預金</strong> — 預金封鎖により引き出しが制限された預金口座</p>
