  <h1 class="chapter-title">ブラック・マンデー（1987年）── 一日で22%の暴落</h1>
</div>

<p>1987年10月19日、ダウ工業株平均は一日で22.6%下落した。史上最大の一日下落率である。</p>
      <ul>
        <li>ポートフォリオ・インシュアランス（自動売りプログラム）が下落を加速させた</li>
        <li>コンピュータによる自動売買が「売りが売りを呼ぶ」連鎖を生んだ</li>
        <li>しかし、FRBが即座に流動性を供給し、実体経済への波及は限定的だった</li>
      </ul>
      <p>ブラック・マンデーの教訓は二つある。一つは、プログラム取引が市場の暴落を増幅しうること。もう一つは、中央銀行の迅速な対応が危機を封じ込めうること。後者の教訓は、以後の金融危機対応の基礎となった。</p>
