  <h1 class="chapter-title">関連用語</h1>
</div>

<p><strong>帳合米取引</strong> — 帳簿上の差金決済による先物取引。現代のデリバティブの原型。</p>
      <p><strong>正米取引</strong> — 現物の米を実際に売買するスポット取引。</p>
      <p><strong>差金決済</strong> — 現物を動かさず、価格差額のみを精算する決済方法。</p>
      <p><strong>ローソク足</strong> — 始値・終値・高値・安値を一つの図形で表すチャート形式。堂島発祥。</p>
      <p><strong>本間宗久</strong> — 出羽国の米商人。ローソク足チャートと酒田五法の考案者とされる。</p>
      <p><strong>堂島米会所</strong> — 1697年開設、1730年幕府公認の世界初の組織化された先物市場。</p>
