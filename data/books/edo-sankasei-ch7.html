  <span class="chapter-num">第七章</span>
  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<p>三貨制度の歴史は、投資家にいくつかの普遍的な教訓を与える。</p>
      <ul>
        <li>通貨制度は固定されたものではない。社会の構造変化に応じて、通貨の形も変わる</li>
        <li>複数の通貨・資産が並立する環境では、交換レートの変動そのものがリスクであり機会となる</li>
        <li>金融インフラ（両替商=銀行）は、通貨制度が複雑であるほど重要性を増す</li>
        <li>信用は支配階級の力をも凌駕する。金融の力学は、政治的な力関係とは独立して動く</li>
      </ul>
      <p>現代においても、為替変動・決済インフラ・信用供与の構造を理解することは、投資判断の基盤である。江戸の三貨制度は、その原型を日本の歴史の中に見せてくれる。</p>
