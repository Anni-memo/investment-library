  <h1 class="chapter-title">何が起きたか ── 半年で10倍、そして崩壊</h1>
</div>

<p>1720年、イギリスの南海会社（South Sea Company）の株価が異常な暴騰を見せた。年初に128ポンドだった株価は、6月には1,050ポンドに達した。半年で約10倍。ロンドン中が投機熱に浮かされた。</p>
      <p>しかし、その年の秋には株価は急落し、多くの投資家が破産した。科学者アイザック・ニュートンも2万ポンド（現在の価値で数億円相当）を失ったと伝えられている。</p>
      <p>万有引力を発見した天才でさえ、群衆の狂気には抗えなかった。</p>
