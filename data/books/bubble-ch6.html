  <h1 class="chapter-title">失われた30年の始まり</h1>
</div>

<p>バブル崩壊後の日本は、長い停滞の時代に入った。</p>
      <ul>
        <li>1997年 ── 北海道拓殖銀行、山一證券が破綻。金融システム危機が現実となった</li>
        <li>1998年 ── 日本長期信用銀行が国有化。不良債権の規模が明らかになった</li>
        <li>2003年 ── りそな銀行への公的資金注入。ようやく底が見えた</li>
      </ul>
      <p>不良債権の処理は「先送り」され続けた。問題を直視せず、公的資金の投入も遅れた。この「先送りの文化」が傷を深くした。</p>
      <p>企業はバランスシートの修復に追われ、投資を控え、賃金を抑えた。家計は消費を抑え、貯蓄に走った。日本経済全体が縮小均衡に陥った。</p>
