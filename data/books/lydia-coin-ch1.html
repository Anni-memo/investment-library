  <span class="chapter-num">第一章</span>
  <h1 class="chapter-title">何が起きたか</h1>
</div>

<p>紀元前7世紀頃、現在のトルコ西部に位置するリディア王国が、世界で初めて均一な鋳造硬貨を作った。</p>
      <p>素材はエレクトラム（金と銀の自然合金）。パクトロス川から採れるこの合金を一定の重さに整え、王の紋章（ライオンの頭部）を刻印した。</p>
      <p>それ以前にも金属の塊が交換に使われていたが、毎回重さを量り、純度を確認する必要があった。リディアの硬貨は、重さと純度を国家が保証した点で革命的だった。</p>
      <p>後にクロイソス王（在位BC560-546年頃）は、純金と純銀の硬貨を分離して鋳造。これにより通貨の信頼性がさらに高まった。</p>
