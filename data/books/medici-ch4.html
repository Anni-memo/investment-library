  <h1 class="chapter-title">今に残っているもの</h1>
</div>

<ul>
        <li>為替手形は現代の銀行送金・信用状（L/C）の直系の先祖だ</li>
        <li>複式簿記はGAAP（一般会計原則）やIFRS（国際財務報告基準）の基盤として、すべての上場企業の財務報告を支えている</li>
        <li>支店網による国際金融ネットワークは、現代のメガバンクのグローバル展開の原型</li>
        <li>金融と文化のパトロネージの関係は、現代の企業メセナやフィランソロピーに通じる</li>
      </ul>
      <p>メディチ銀行は1494年に崩壊した。フランス軍のフィレンツェ侵攻と、後継者たちの放漫経営が重なった結果だ。しかし、彼らが築いた金融の「仕組み」は600年後の今も生きている。</p>
