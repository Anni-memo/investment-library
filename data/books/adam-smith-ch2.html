  <h1 class="chapter-title">なぜ書かれたか ── 重商主義への反論</h1>
</div>

<p>スミスが『国富論』を執筆した背景には、当時支配的だった重商主義への強い批判があった。</p>
      <ul>
        <li><strong>重商主義</strong> ── 国家が貿易を統制し、金銀の蓄積を国富と見なす考え方。輸出を奨励し輸入を制限する</li>
        <li><strong>ギルド制度</strong> ── 同業者組合が生産量や価格を統制し、新規参入を阻害していた</li>
        <li><strong>東インド会社の独占</strong> ── 特定の企業に貿易の独占権を与え、競争を排除していた</li>
      </ul>
      <p>スミスはこれらの統制が経済の効率を妨げていると主張した。国家が管理するよりも、個人が自由に経済活動を行う方が、社会全体の富は増大する ── これが『国富論』の核心的メッセージだった。</p>
