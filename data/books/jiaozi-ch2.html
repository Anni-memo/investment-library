  <h1 class="chapter-title">なぜ起きたか</h1>
</div>

<p>交子が生まれた背景には、宋代中国の驚異的な経済発展がある。</p>
      <ul>
        <li>人口1億人を超え、都市商業が爆発的に成長</li>
        <li>四川は鉄の産地で鉄銭が流通したが、重量が取引の障害に</li>
        <li>長距離交易の拡大で、軽量で持ち運びやすい決済手段が求められた</li>
        <li>印刷技術（木版印刷）の発達が、証書の大量生産を可能にした</li>
      </ul>
      <p>技術（印刷）と経済的ニーズ（軽量な交換媒体）が結びついた結果、紙幣というイノベーションが生まれた。ヨーロッパで紙幣が登場するのは、これより700年以上後のことだ。</p>
