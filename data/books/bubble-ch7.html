  <h1 class="chapter-title">不良債権処理と金融システム危機</h1>
</div>

<p>バブル崩壊で生じた不良債権の総額は、最終的に100兆円を超えたと推計されている。</p>
      <p>なぜこれほど問題が大きくなったのか。</p>
      <ul>
        <li>銀行は不良債権の実態を隠し続けた</li>
        <li>政府は「護送船団方式」で銀行を守ろうとしたが、問題の先送りにしかならなかった</li>
        <li>地価の継続的な下落が、担保価値をさらに毀損した</li>
        <li>デフレが始まり、実質的な債務負担が増加した</li>
      </ul>
      <p>金融危機の教訓は明確だ。問題の先送りは、コストを増大させる。早期の損失認識と透明性が、回復への最短経路である。</p>
