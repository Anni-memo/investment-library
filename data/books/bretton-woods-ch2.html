  <h1 class="chapter-title">なぜ必要だったか --- 二度の大戦と大恐慌の教訓</h1>
</div>

<p>ブレトンウッズ体制が生まれた背景には、20世紀前半の悲惨な経験があった。</p>
      <ul>
        <li><strong>通貨切り下げ競争</strong> --- 1930年代、各国が自国通貨を競って切り下げ、輸出を有利にしようとした。結果は「近隣窮乏化政策」の連鎖</li>
        <li><strong>貿易の崩壊</strong> --- 関税と為替の不安定が国際貿易を破壊し、大恐慌を深刻化させた</li>
        <li><strong>政治的帰結</strong> --- 経済危機は社会不安を招き、ファシズムの台頭と世界大戦につながった</li>
      </ul>
      <p>安定した国際金融秩序なくして、平和も繁栄もありえない。これがブレトンウッズに集まった代表たちの共通認識だった。</p>
