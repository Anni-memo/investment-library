  <h1 class="chapter-title">1882年 日本銀行の設立</h1>
</div>

<p>1882年（明治15年）、日本銀行条例が公布され、日本銀行が設立された。これにより、日本の通貨制度は根本から変わった。</p>
      <p>中央銀行には三つの基本的な機能がある。</p>
      <ul>
        <li><strong>発券銀行</strong> --- 紙幣（日本銀行券）を独占的に発行する。通貨の統一と信用の確立</li>
        <li><strong>銀行の銀行</strong> --- 市中銀行に対する最後の貸し手として機能し、金融システムの安定を保つ</li>
        <li><strong>政府の銀行</strong> --- 国庫金の管理、国債の発行・償還を担う</li>
      </ul>
      <p>日本銀行の設立は、単なる制度の変更ではなかった。「通貨の発行権を国家が一元管理する」という近代国家の原則を、日本が手に入れた瞬間だった。</p>
