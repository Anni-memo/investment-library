  <h1 class="chapter-title">今に残るもの ── すべての取引所の原型</h1>
</div>

<p>アムステルダム取引所が生み出した仕組みは、現代のすべての証券取引所のDNAとなっている。</p>
      <ul>
        <li><strong>空売り</strong> ── 持っていない株を借りて売り、値下がり後に買い戻す。1609年には既に存在した</li>
        <li><strong>先物取引</strong> ── 将来の特定日に特定価格で売買する約束。堂島の米先物（1730年代）より100年以上早い</li>
        <li><strong>板寄せ</strong> ── 買い注文と売り注文を突き合わせて価格を決定する仕組み</li>
      </ul>
      <p>ニューヨーク証券取引所も東京証券取引所も、その根本にはアムステルダムで確立された原理がある。</p>
