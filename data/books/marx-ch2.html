  <h1 class="chapter-title">なぜ書かれたか ── 産業革命の影</h1>
</div>

<p>マルクスが『資本論』を執筆した19世紀中葉のヨーロッパは、産業革命の恩恵と苦痛が同時に噴き出していた時代だった。</p>
      <ul>
        <li>工場労働者は1日14-16時間働き、女性や子どもも過酷な労働に従事した</li>
        <li>労働者の平均寿命は、裕福な階層の半分以下だった</li>
        <li>経済は急成長していたが、その果実は資本家に集中していた</li>
        <li>周期的な恐慌が繰り返され、労働者は失業と貧困に晒された</li>
      </ul>
      <p>アダム・スミスの「見えざる手」は、なぜ労働者を救わないのか。市場の自由は、なぜ格差を拡大するのか。マルクスは、資本主義そのものの構造にその原因を見出そうとした。</p>
