  <h1 class="chapter-title">何が起きたか ── 経済学の誕生</h1>
</div>

<p>1776年、スコットランドの哲学者アダム・スミスが『諸国民の富の性質と原因の研究』（通称『国富論』）を出版した。アメリカ独立宣言と同じ年である。</p>
      <p>スミスは道徳哲学の教授であり、純粋な経済学者ではなかった。しかし『国富論』は、経済の仕組みを体系的に分析した初めての書物として、経済学という学問分野そのものを誕生させた。</p>
      <p>全5編、約900ページ。分業の利点から国際貿易、税制、植民地政策まで、経済活動のあらゆる側面を論じた大著である。</p>
