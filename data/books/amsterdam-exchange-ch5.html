  <h1 class="chapter-title">投資家にとっての意味 ── 流動性の価値を知る</h1>
</div>

<p>アムステルダム取引所の歴史は、投資家に一つの本質的な教訓を伝えている。</p>
      <ul>
        <li><strong>流動性にはプレミアムがある</strong> ── 「いつでも売れる」資産は、「売れない」資産より高く評価される</li>
        <li><strong>流動性は突然消える</strong> ── 平時には当たり前に存在する流動性が、危機時に突然消失する</li>
        <li><strong>市場の存在自体が価値</strong> ── 売買の場があること自体が、投資のハードルを下げている</li>
      </ul>
      <p>不動産、未公開株、暗号資産。流動性の低い資産に投資する際は、「売りたい時に売れるか」を常に問うべきだ。400年前にアムステルダムの商人たちが発見した真理は、今も変わらない。</p>
