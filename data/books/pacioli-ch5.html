  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>財務諸表が読めることは、投資の最も基本的なリテラシーである。その原理は500年前から変わっていない</li>
        <li>複式簿記の「借方＝貸方」は、企業の資産・負債・資本の関係を理解する出発点だ</li>
        <li>会計の透明性は、株式市場の信頼基盤である。粉飾決算が発覚するたびに株価が暴落するのは、この信頼が裏切られるからだ</li>
        <li>パチョーリが体系化した「すべての取引を二面から記録する」という思想は、リスク管理の原点でもある。一方だけを見て判断する危うさを、会計は構造的に防いでいる</li>
      </ul>
