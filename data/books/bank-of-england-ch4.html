  <h1 class="chapter-title">今に残るもの ── 中央銀行という制度</h1>
</div>

<p>イングランド銀行が確立した「中央銀行」の概念は、現代の金融システムの根幹をなしている。</p>
      <ul>
        <li><strong>通貨発行権</strong> ── 法定通貨を発行する権限。現代では中央銀行の独占的権能</li>
        <li><strong>金融政策</strong> ── 金利の調整を通じて経済を安定させる機能</li>
        <li><strong>最後の貸し手</strong> ── 金融危機時に流動性を供給し、システム崩壊を防ぐ役割</li>
        <li><strong>政府の銀行</strong> ── 国庫の管理と国債の発行を担う</li>
      </ul>
      <p>330年前に戦費調達のために生まれた仕組みが、現代の世界経済を支えるインフラとなっている。歴史の皮肉ではあるが、戦争こそが制度革新の最大の推進力だった。</p>
