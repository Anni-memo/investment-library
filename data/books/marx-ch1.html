  <h1 class="chapter-title">何が起きたか ── 資本主義の「設計図」を暴いた書物</h1>
</div>

<p>1867年、ドイツ出身の思想家カール・マルクスが『資本論（Das Kapital）』第1巻をハンブルクで出版した。第2巻と第3巻は、マルクスの死後にエンゲルスの編集により刊行された。</p>
      <p>『資本論』は、資本主義経済の構造を内部から分析した著作である。商品の価値がどのように生まれ、利潤がどこから来るのか、資本がいかにして蓄積されるのか。マルクスはこれらを労働価値説に基づいて体系的に解明しようとした。</p>
      <p>出版当時、反響は限定的だった。しかしこの書物は、20世紀の世界を二分する思想的基盤となる。</p>
