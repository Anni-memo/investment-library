  <h1 class="chapter-title">何が起きたか --- 日曜夜のテレビ演説</h1>
</div>

<p>1971年8月15日、日曜日の夜。リチャード・ニクソン大統領はテレビカメラの前に立ち、アメリカの経済政策を根本的に変える宣言を行った。</p>
      <p>「ドルと金の交換を一時的に停止する」。</p>
      <p>「一時的」と言ったが、二度と再開されることはなかった。ブレトンウッズ体制 --- 金1オンス＝35ドルで固定し、各国通貨がドルに連動する戦後の国際金融秩序 --- が、この瞬間に崩壊した。</p>
      <p>同時にニクソンは90日間の賃金・物価凍結と10%の輸入課徴金を発表した。これらを総称して「ニクソン・ショック」と呼ぶ。世界の金融市場は翌朝から大混乱に陥った。</p>
