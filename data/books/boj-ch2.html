  <h1 class="chapter-title">松方正義と中央銀行構想</h1>
</div>

<p>このインフレ危機に対処したのが、大蔵卿・松方正義だった。松方は欧州視察でベルギー国立銀行やイングランド銀行を研究し、日本に中央銀行が不可欠であると確信した。</p>
      <p>松方の認識は明快だった。通貨の発行権を一つの機関に集中させなければ、通貨の信用は維持できない。複数の銀行がそれぞれ紙幣を刷る仕組みでは、インフレは構造的に避けられない。</p>
      <p>松方はまず「松方デフレ」と呼ばれる厳しい緊縮財政を実行し、過剰な不換紙幣を回収した。その上で、通貨制度の根本的な改革として中央銀行の設立を推進した。</p>
