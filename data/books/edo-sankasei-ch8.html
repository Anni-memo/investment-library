  <h1 class="chapter-title">関連用語</h1>

<p><strong>三貨制度</strong> — 江戸時代に金貨・銀貨・銭貨の三種の通貨が並立した制度。</p>
      <p><strong>両替商</strong> — 三貨の交換を行い、預金・貸付・為替など銀行機能も担った商人。</p>
      <p><strong>札差</strong> — 武士の禄米を換金・前貸しした金融業者。</p>
      <p><strong>金遣い</strong> — 江戸を中心とした東日本の金貨経済圏。</p>
      <p><strong>銀遣い</strong> — 大阪を中心とした西日本の銀貨経済圏。</p>
      <p><strong>丁銀</strong> — 秤量貨幣として重さで価値を量った銀貨。</p>
      <p><strong>小判</strong> — 計数貨幣として枚数で価値を数えた金貨。</p>
