  <span class="chapter-num">第三章</span>
  <h1 class="chapter-title">預金封鎖の実態</h1>
</div>

<p>預金封鎖の目的は表向き「インフレの抑制」だった。市中の過剰な通貨を回収し、物価上昇を食い止めるという論理だ。</p>
      <p>しかし、もうひとつの隠された目的があった。それが「財産税」の課税基盤の把握だ。</p>
      <p>預金を封鎖することで、国民の金融資産を正確に捕捉できる。封鎖された預金口座の残高が、そのまま課税対象の把握に使われた。</p>
      <p>預金封鎖の期間中、物価は引き続き上昇した。月300円の引き出し制限は、インフレが進むにつれて実質的にさらに厳しくなった。封鎖期間は当初3ヶ月とされたが、段階的に延長され、完全な解除は1954年まで続いた。</p>
