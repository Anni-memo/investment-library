<p><strong>固定相場制</strong> --- 各国通貨の交換比率を一定に固定する制度</p>
      <p><strong>基軸通貨</strong> --- 国際取引や外貨準備の中心となる通貨</p>
      <p><strong>IMF</strong> --- 国際通貨基金。国際収支の安定と為替制度の監視を担う</p>
      <p><strong>世界銀行</strong> --- 開発途上国への融資・支援を行う国際機関</p>
      <p><strong>金ドル本位制</strong> --- ドルのみが金と交換可能で、他の通貨はドルに連動する制度</p>
      <p><strong>ケインズ案 vs ホワイト案</strong> --- ブレトンウッズ会議で対立した二つの国際通貨構想</p>
