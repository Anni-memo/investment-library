  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>通貨の価値は「何でできているか」ではなく「誰が保証しているか」で決まる。この認識は為替投資の根本に関わる</li>
        <li>国家の信用が揺らげば通貨も揺らぐ。ハイパーインフレの歴史はそれを証明している</li>
        <li>ゴールドが「究極の安全資産」とされるのは、国家の信用に依存しない価値保存手段だからだ</li>
        <li>暗号資産は「国家の保証なしに通貨は成立するか」という、リディア以来の問いへの実験である</li>
      </ul>
