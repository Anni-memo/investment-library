  <span class="chapter-num">第三章</span>
  <h1 class="chapter-title">スミソニアン合意から変動相場制へ</h1>
</div>

<p>ニクソン・ショック後、各国は新たな固定相場制での合意を模索した。1971年12月、ワシントンのスミソニアン博物館で10カ国が集まり「スミソニアン合意」に至った。</p>
      <p>金の公定価格を1オンス＝38ドルに引き上げ、各国通貨の変動幅を拡大する。しかしこの「修正ブレトンウッズ」は長持ちしなかった。</p>
      <p>1973年までに主要国は次々と変動相場制に移行。為替レートは市場の需給で決まるようになった。人類史上初めて、すべての主要通貨が金の裏付けなしに流通する時代が本格的に始まった。</p>
