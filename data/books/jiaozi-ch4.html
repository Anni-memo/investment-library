  <h1 class="chapter-title">今に残っているもの</h1>
</div>

<p>交子が示した2つの真実は、1000年後の今も変わっていない。</p>
      <ul>
        <li>紙幣（法定通貨）は経済を飛躍的に効率化する — 現代経済は紙幣なしに成り立たない</li>
        <li>通貨の過剰発行はインフレを引き起こす — 2020年代の世界的インフレも同じ構造</li>
        <li>通貨の価値は政府の信用に依存する — 信用が失われれば紙幣は紙切れになる</li>
        <li>デジタル通貨は交子の延長線上にある — お金の非物質化は1000年前に始まった</li>
      </ul>
