  <h1 class="chapter-title">日銀の金融緩和と資産インフレ</h1>
</div>

<p>円高不況を食い止めるため、日銀は公定歩合を5.0%から2.5%まで引き下げた。史上最低水準の金利が長期間維持された。</p>
      <p>潤沢なマネーは実体経済ではなく、株式市場と不動産市場に流れ込んだ。</p>
      <ul>
        <li>銀行は土地を担保に融資を拡大した</li>
        <li>土地の値上がりが担保価値を高め、さらなる融資を可能にした</li>
        <li>企業は本業よりも「財テク」（金融技術による資産運用）に走った</li>
        <li>株価と地価が互いを押し上げる循環が生まれた</li>
      </ul>
      <p>これが資産インフレの正体だった。消費者物価は安定していたため、日銀は金融引き締めのタイミングを逸した。</p>
