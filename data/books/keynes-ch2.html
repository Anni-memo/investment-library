  <h1 class="chapter-title">なぜこの理論が必要だったか --- 古典派の破綻</h1>
</div>

<p>世界大恐慌は、既存の経済理論への信頼を粉砕した。</p>
      <p>古典派経済学の「セイの法則」は「供給はそれ自身の需要を生む」と主張した。つまり、生産されたものは必ず売れる。失業は一時的で、賃金が下がれば企業は再び人を雇う、と。</p>
      <p>しかし現実は違った。賃金が下がっても、物価が下がっても、企業は人を雇わなかった。需要そのものが消失していたからだ。将来への不安が消費と投資を凍結させ、経済全体が縮小均衡に陥った。</p>
      <p>ケインズはこの状態を理論的に説明し、処方箋を示した。それが「有効需要の原理」だった。</p>
