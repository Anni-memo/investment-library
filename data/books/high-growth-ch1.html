  <h1 class="chapter-title">高度経済成長 --- 1955-73年、年率10%成長</h1>
</div>

<p>1955年から1973年にかけて、日本経済は年平均約10%という驚異的な成長を遂げた。「東洋の奇跡」と呼ばれたこの成長は、焼け野原から世界第2位の経済大国への跳躍だった。</p>
      <p>この成長を支えたのは、重化学工業化と輸出主導の産業政策だ。鉄鋼、造船、自動車、電機。政府と企業が一体となって、産業の近代化を推し進めた。</p>
      <p>しかし、この急速な工業化には膨大な資金が必要だった。設備投資、技術導入、工場建設。資金需要は、企業の自己資本だけではとても賄えない規模だった。</p>
      <p>この資金をどう調達するか。日本が選んだ答えが「間接金融」だった。</p>
