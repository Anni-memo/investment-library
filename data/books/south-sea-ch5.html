  <span class="chapter-num">第五章</span>
  <h1 class="chapter-title">投資家にとっての意味 ── 天才でもバブルには勝てない</h1>
</div>

<p>ニュートンの失敗は、知性だけではバブルから身を守れないことを示している。</p>
      <ul>
        <li><strong>群集心理は合理性を圧倒する</strong> ── 周囲が儲けているとき、冷静でいることは極めて難しい</li>
        <li><strong>「一度売って、また買い直す」が最も危険</strong> ── ニュートンは早期に利益確定したが、周囲の続騰を見て再参入し、大損した</li>
        <li><strong>スキームの複雑さは危険信号</strong> ── 仕組みが理解できないものに投資してはならない</li>
      </ul>
      <p>バブルの最大の教訓は「自分は例外ではない」ということだ。天才物理学者ですら例外ではなかった。</p>
