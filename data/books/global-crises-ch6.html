  <h1 class="chapter-title">アジア通貨危機（1997年）── 新興国の脆弱性</h1>
</div>

<p>1997年7月、タイバーツの暴落をきっかけに、東南アジア全域に通貨危機が波及した。</p>
      <ul>
        <li>タイ、インドネシア、韓国がIMFに救済を要請した</li>
        <li>固定為替相場制と短期外貨借入の組み合わせが脆弱性の根源だった</li>
        <li>外国資本が一斉に引き揚げる「キャピタル・フライト」が起きた</li>
        <li>韓国ではIMFの構造改革要求が「IMF危機」として国民的トラウマとなった</li>
      </ul>
      <p>アジア通貨危機は、新興国の経済成長が外国資本への依存に基づく場合、その成長は脆いものであることを示した。「アジアの奇跡」は、一夜にして「アジアの危機」に変わった。</p>
