  <h1 class="chapter-title">堂島米市場とは</h1>
</div>

<p>堂島米会所は、1697年に大阪・堂島に開設された米の取引市場である。1730年、幕府によって正式に「帳合米取引（ちょうあいまいとりひき）」が公認された。</p>
      <p>これは、現物の米を直接やり取りせず、将来の一定期日に米を受け渡す契約を売買するものだった。つまり、先物取引である。</p>
      <p>シカゴ商品取引所（CBOT）が穀物の先物取引を開始したのは1848年。堂島はそれよりおよそ120年も早い。世界で最初に組織化された先物市場として、金融史に確かな足跡を残している。</p>
