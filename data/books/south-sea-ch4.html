  <h1 class="chapter-title">今に残るもの ── 「バブル」という言葉の起源</h1>
</div>

<p>南海泡沫事件は、金融市場における「バブル（泡沫）」という概念を人類に刻みつけた。</p>
      <ul>
        <li><strong>投機と投資の境界</strong> ── 実態のない「物語」に群がる行為は投資ではない</li>
        <li><strong>政治と金融の癒着</strong> ── インサイダー取引や政治家への賄賂は、現代でも繰り返されるテーマ</li>
        <li><strong>規制の必要性と限界</strong> ── 市場の自由と投資家保護のバランスは永遠の課題</li>
      </ul>
      <p>チューリップ・バブル（1637年）、南海泡沫事件（1720年）、そして現代の暗号資産バブル。人間の投機衝動は、300年経っても本質的に変わっていない。</p>
