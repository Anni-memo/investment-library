  <h1 class="chapter-title">金融緊急措置令 --- 1946年2月</h1>
</div>

<p>1946年2月16日夕方、政府は突然「金融緊急措置令」と「日本銀行券預入令」を発令した。翌2月17日から施行という、事実上の奇襲だった。</p>
      <p>その内容は衝撃的なものだった。</p>
      <ul>
        <li><strong>旧紙幣の無効化</strong> --- 現行の日本銀行券（旧円）は期限付きで無効とされ、新しい紙幣（新円）に切り替えられた</li>
        <li><strong>預金封鎖</strong> --- すべての金融機関の預金が封鎖され、引き出しに厳しい制限が設けられた</li>
        <li><strong>引き出し制限</strong> --- 世帯主は月額300円、家族は1人100円までしか引き出せなかった</li>
      </ul>
      <p>国民は自分のお金を自由に使えなくなった。文字通り一夜にして。</p>
