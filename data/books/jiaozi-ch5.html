  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>お金の本質は物質ではなく信用である。この認識は、法定通貨・暗号資産・デジタル通貨を理解する鍵になる</li>
        <li>通貨の過剰発行→インフレ→通貨価値の毀損というサイクルは1000年前から同じ。インフレ耐性のある資産配分が重要な理由だ</li>
        <li>技術革新が金融を変える。印刷が交子を生んだように、ブロックチェーンがビットコインを生んだ</li>
        <li>政府が通貨発行権を持つことの意味と危険を、歴史的視点で理解できる</li>
      </ul>
