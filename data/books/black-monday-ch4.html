  <h1 class="chapter-title">アルゴリズムと市場安定 ── 未解決の問い</h1>
</div>

<p>ブラック・マンデーが提起した問題は、テクノロジーが進化した現在でも解決されていない。</p>
      <p>2010年の「フラッシュ・クラッシュ」では、高頻度取引（HFT）が数分間で市場を混乱させた。2020年のコロナ・ショックでもサーキットブレーカーが複数回発動した。</p>
      <p>アルゴリズムは市場に流動性を提供する一方で、危機時にはその流動性を瞬時に奪い去る。機械の速度で動く市場において、人間はどこまで制御できるのか。1987年に生まれたこの問いは、AIが取引に参入する時代に、さらに重みを増している。</p>
