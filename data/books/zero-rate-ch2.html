  <span class="chapter-num">第二章</span>
  <h1 class="chapter-title">量的緩和政策（2001年〜）</h1>
</div>

<p>金利がゼロになった後、日銀に残された手段は「量」だった。2001年3月、日銀は操作目標を金利から当座預金残高に切り替え、世界初の量的緩和政策を開始した。</p>
      <p>これは「金利を下げられないなら、お金の量を増やす」という発想の転換だった。</p>
      <ul>
        <li>国債の買い入れを通じて市場にマネーを供給した</li>
        <li>銀行の当座預金残高の目標を段階的に引き上げた</li>
        <li>「デフレが終わるまで続ける」という時間軸効果で市場の期待に働きかけた</li>
      </ul>
      <p>効果は限定的だったが、この政策は後に世界中の中央銀行が採用する「QE（量的緩和）」の先駆けとなった。日本は金融政策の実験場だった。</p>
