  <h1 class="chapter-title">チューリップ・バブル（1637年）── 史上初の投機バブル</h1>
</div>

<p>17世紀のオランダ。黄金時代の繁栄の中で、チューリップの球根が投機の対象となった。</p>
      <p>珍しい品種の球根一つが、熟練工の年収の10倍以上で取引された。先物契約が生まれ、球根を見たこともない人々が売買に参加した。</p>
      <p>1637年2月、突然買い手がいなくなった。価格は数週間で90%以上暴落した。</p>
      <p>チューリップ・バブルが示したのは、「実体価値から乖離した投機は必ず崩壊する」という、以後400年繰り返される真理だった。</p>
