  <span class="chapter-num">第一章</span>
  <h1 class="chapter-title">何が起きたか</h1>
</div>

<p>紀元前1750年頃、バビロニア（現在のイラク中南部）の王ハンムラビは、帝国全域に適用される統一法典を編纂した。282条の法律が、高さ2.25メートルの閃緑岩の石柱に刻まれた。</p>
      <p>この法典には「目には目を、歯には歯を」の同害報復法で知られる刑法だけでなく、商取引・貸借・利率に関する詳細な経済規定が含まれていた。</p>
      <p>特に重要なのは利率制限である。大麦貸付の利率上限は年33.3%（3分の1）、銀の貸付は年20%（5分の1）と定められた。これに違反した貸し手は、債権そのものを失うという厳罰が科された。</p>
