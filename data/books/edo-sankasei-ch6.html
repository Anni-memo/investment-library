  <h1 class="chapter-title">今に残っているもの -- 日本の銀行文化の起源</h1>
</div>

<p>三貨制度そのものは明治の通貨改革で終わりを迎えた。しかし、そこで培われた金融文化は現代にまで続いている。</p>
      <ul>
        <li>両替商の技術は明治以降の銀行制度の基盤となった</li>
        <li>大阪の商人文化は、日本の金融・商業の中心としての伝統を形作った</li>
        <li>為替手形の仕組みは、現代の決済システムの原型である</li>
        <li>信用に基づく前貸しの慣行は、日本的な融資文化へとつながった</li>
      </ul>
      <p>日本の金融が西洋のモデルを単に模倣したものではなく、独自の歴史的基盤を持っていること。これを知ることは、日本の金融市場を理解する上で重要な視点となる。</p>
