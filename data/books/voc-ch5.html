  <span class="chapter-num">第五章</span>
  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>株式投資は「会社の一部を所有する」行為だ。VOCの時代から、この本質は変わっていない</li>
        <li>流動性（いつでも売れること）は、投資のリスクを根本的に変える。流動性のない資産への投資は本質的に異なる</li>
        <li>分散投資の原理は400年前から有効だ。一つの航海に全財産を賭けない。一つの銘柄に集中しない</li>
        <li>どれほど支配的な企業でも、経営規律の崩壊で消滅する。VOCの歴史は、ガバナンスの重要性を教えている</li>
      </ul>
