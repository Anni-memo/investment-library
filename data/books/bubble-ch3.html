  <h1 class="chapter-title">日経平均38,915円 ── 1989年12月29日</h1>
</div>

<p>1989年の大納会、日経平均株価は38,915円87銭の史上最高値をつけた。この数字は、その後34年間破られることはなかった。</p>
      <p>当時の日本には、根拠のない楽観が蔓延していた。</p>
      <ul>
        <li>NTT株の上場（1987年）に国民が熱狂した</li>
        <li>「日本的経営は世界最強」という神話が信じられていた</li>
        <li>PER（株価収益率）は60倍を超えていたが、「日本は特別」とされた</li>
      </ul>
      <p>バブルの最中にいる人間は、それがバブルだと気づかない。これは時代を超えて繰り返される真理である。</p>
