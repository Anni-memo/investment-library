  <h1 class="chapter-title">何が起きたか</h1>
</div>

<p>紀元前3000年頃、メソポタミア（現在のイラク南部）のシュメール人は、農業を基盤とした都市文明を築いていた。</p>
      <p>彼らは大麦を貸し出し、収穫後に元本に加えて「追加分」をつけて返す契約を行った。この追加分こそが、人類最古の「利子」である。</p>
      <p>契約は粘土板に楔形文字で記録された。貸し手、借り手、貸付量、返済量、返済期日が明記されている。現代のローン契約書と本質的に同じ構造だ。</p>
      <p>硬貨はまだ存在しない。貨幣経済が始まる2000年以上前に、信用取引はすでに制度化されていた。</p>
