  <h1 class="chapter-title">関連用語</h1>

<p><strong>交子（こうし/ジャオズ）</strong> — 北宋時代（10世紀末）に四川で生まれた世界初の紙幣。商人の預かり証書から政府公認の通貨へ発展。</p>
      <p><strong>法定通貨（fiat money）</strong> — 政府が法的に価値を保証する通貨。金や銀による裏付けを持たない。現代の紙幣はすべて法定通貨。</p>
      <p><strong>通貨膨張</strong> — 通貨の過剰発行による貨幣価値の下落。南宋・元朝の交子乱発は歴史上最初の顕著な事例。</p>
      <p><strong>木版印刷</strong> — 中国で発達した印刷技術。交子の大量生産を可能にした技術的基盤。</p>
