  <h1 class="chapter-title">なぜ起きたか</h1>
</div>

<p>ギリシャ世界は数百の独立した都市国家からなり、それぞれが通貨主権を持っていた。統一通貨は存在しない。</p>
      <ul>
        <li>地中海貿易の拡大で、異なる通貨間の両替需要が急増</li>
        <li>偽造硬貨が横行し、貨幣の真贋鑑定が専門的技能として求められた</li>
        <li>富裕市民が安全な資産保管を必要とし、預金サービスが生まれた</li>
        <li>神殿が大量の奉納金を保管・貸付する「神殿銀行」として機能していた</li>
      </ul>
      <p>アテナイの民主制と商業の発展が、金融仲介という専門職を生み出す土壌となった。自由な経済活動が、金融イノベーションを促した古典的な事例である。</p>
