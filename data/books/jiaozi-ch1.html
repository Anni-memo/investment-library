  <span class="chapter-num">第一章</span>
  <h1 class="chapter-title">何が起きたか</h1>
</div>

<p>10世紀後半、中国の宋王朝の時代。四川地方では銅銭が不足し、代わりに重くかさばる鉄銭が流通していた。鉄銭1000枚で約25kgにもなり、大規模な商取引には極めて不便だった。</p>
      <p>成都の商人たちは、鉄銭を信用ある店に預け、代わりに「交子」と呼ばれる預かり証書を受け取る仕組みを考案した。この証書が商人間で流通し始め、事実上の紙幣として機能するようになった。</p>
      <p>1023年、宋朝政府は民間の交子発行を禁止し、国家が公式に「官交子」を発行する制度を整えた。政府公認の紙幣制度の誕生である。</p>
