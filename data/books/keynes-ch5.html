  <span class="chapter-num">第五章</span>
  <h1 class="chapter-title">批判と限界 --- スタグフレーションの衝撃</h1>
</div>

<p>ケインズ経済学は万能ではなかった。1970年代、インフレと不況が同時に進行する「スタグフレーション」が発生し、ケインズ理論では説明できない現象に直面した。</p>
      <p>ミルトン・フリードマンに代表されるマネタリストは、財政政策より金融政策を重視すべきだと主張。政府支出の拡大はインフレを招くだけだと批判した。</p>
      <p>しかし2008年のリーマン・ショックでケインズは「復活」した。金利がゼロに達し、「流動性の罠」が現実のものとなったとき、各国政府は大規模な財政出動に踏み切った。ケインズの理論は、危機のたびにその有効性を示し続けている。</p>
