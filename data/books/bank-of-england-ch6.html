  <h1 class="chapter-title">関連用語</h1>
</div>

<ul>
        <li><strong>イングランド銀行（Bank of England）</strong> — 1694年設立。世界で最も古い中央銀行の一つ。通称「オールド・レディ」</li>
        <li><strong>銀行券</strong> — 銀行が発行する約束手形。のちに法定通貨として流通するようになった紙幣の原型</li>
        <li><strong>中央銀行</strong> — 通貨の発行、金融政策の運営、金融システムの安定を担う国の機関</li>
        <li><strong>最後の貸し手（Lender of Last Resort）</strong> — 金融危機時に、他に資金の出し手がいないとき最終的に融資を行う中央銀行の役割</li>
        <li><strong>通貨発行権</strong> — 法定通貨を発行する権限。中央銀行が独占的に保有する</li>
      </ul>
