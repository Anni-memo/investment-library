  <span class="chapter-num">第二章</span>
  <h1 class="chapter-title">なぜ起きたか</h1>
</div>

<p>ハンムラビ法典の金融規定は、社会問題への対応だった。穀物貸付の仕組みが広まるにつれ、高利貸しによる搾取が深刻化していたのだ。</p>
      <ul>
        <li>返済不能に陥った農民が土地を奪われ、債務奴隷になるケースが増加</li>
        <li>貸し手が不当に高い利率を要求し、社会の不安定化を招いていた</li>
        <li>農民の没落は兵力と税収の減少に直結し、王権の基盤を揺るがした</li>
      </ul>
      <p>ハンムラビの目的は「強者が弱者を虐げないようにする」こと。法典の序文にはそう明記されている。これは単なる道徳ではなく、帝国の安定のための政治的判断だった。</p>
