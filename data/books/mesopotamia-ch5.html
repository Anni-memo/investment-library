  <h1 class="chapter-title">投資家にとっての意味</h1>

<ul>
        <li>金利は「時間の価格」である。この認識は、債券投資・DCF分析・複利計算すべての土台になる</li>
        <li>信用（クレジット）は貨幣より古い。お金の形が変わっても、信用の仕組みは変わらない</li>
        <li>利子には常に「返済できないリスク」が伴う。信用リスクの管理は5000年前から金融の核心だ</li>
        <li>規制と自由のバランスも、ハンムラビの時代から続く永遠のテーマである</li>
      </ul>
