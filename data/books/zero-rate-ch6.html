  <h1 class="chapter-title">マイナス金利（2016年）</h1>
</div>

<p>2016年1月、日銀はマイナス金利政策の導入を決定した。銀行が日銀に預ける当座預金の一部に、マイナス0.1%の金利を課す。お金を預けると利息を「取られる」という、常識を覆す政策だった。</p>
      <ul>
        <li>銀行の収益を圧迫し、金融仲介機能を弱めた</li>
        <li>住宅ローン金利は史上最低水準に低下した</li>
        <li>「貯蓄の意味」が根本的に問い直された</li>
        <li>国民の間に「預金しても増えない」という感覚が定着した</li>
      </ul>
      <p>マイナス金利は2024年3月に解除された。8年間続いたこの「実験」は、金融政策の限界領域を示すものだった。</p>
