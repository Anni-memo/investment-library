  <h1 class="chapter-title">関連用語</h1>

<p><strong>VOC</strong> — Vereenigde Oostindische Compagnie（連合東インド会社）。1602年設立の世界初の公開株式会社。</p>
      <p><strong>公開株式会社</strong> — 株式を一般に公開し、誰でも出資・売買できる会社形態。現代の上場企業の原型。</p>
      <p><strong>アムステルダム証券取引所</strong> — 1602年に開設された世界初の証券取引所。現在のユーロネクスト・アムステルダム。</p>
      <p><strong>配当</strong> — 企業の利益の一部を株主に分配すること。VOCが制度化した株主還元の仕組み。</p>
      <p><strong>有限責任</strong> — 出資者の損失が出資額を超えない制度。近代企業制度の根幹。</p>
