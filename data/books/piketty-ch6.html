  <h1 class="chapter-title">関連用語</h1>
</div>

<ul>
        <li><strong>r > g</strong> — 資本収益率（r）が経済成長率（g）を上回る不等式。ピケティの中心的命題</li>
        <li><strong>資本収益率（r）</strong> — 株式・不動産・債券などの資本から得られるリターンの年率</li>
        <li><strong>経済成長率（g）</strong> — GDP（国内総生産）の成長率。労働所得の伸びに近似する</li>
        <li><strong>資産格差</strong> — 保有資産の規模に基づく経済的格差。所得格差よりも大きい</li>
        <li><strong>累進課税</strong> — 所得や資産が多いほど税率が高くなる課税方式</li>
        <li><strong>グローバル資産税</strong> — ピケティが提唱した、全世界的な累進資産課税の構想</li>
      </ul>
