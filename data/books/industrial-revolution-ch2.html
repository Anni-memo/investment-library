  <h1 class="chapter-title">なぜイギリスで起きたか ── 三つの条件の合流</h1>
</div>

<p>産業革命がなぜ18世紀のイギリスで起きたのか。歴史家たちは三つの条件の同時成立を指摘する。</p>
      <ul>
        <li><strong>科学技術の発展</strong> ── ニュートン以来の科学革命が技術革新の土壌を作った</li>
        <li><strong>石炭エネルギー</strong> ── イギリスは豊富な石炭資源を持ち、木炭に代わるエネルギー源を確保できた</li>
        <li><strong>資本蓄積</strong> ── 大航海時代以降の貿易利益と、イングランド銀行を中心とする金融制度が、大規模投資を可能にした</li>
      </ul>
      <p>技術だけでは革命は起きない。資本だけでも起きない。技術と資本とエネルギーが同時に揃ったとき、初めて産業革命という巨大な転換が可能になった。</p>
