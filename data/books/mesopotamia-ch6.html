  <h1 class="chapter-title">関連用語</h1>
</div>

<p><strong>利子（interest）</strong> — 資金の貸借において、時間の経過に対して支払われる対価。金融の最も基本的な概念。</p>
      <p><strong>粘土板</strong> — メソポタミアで使われた記録媒体。楔形文字で契約内容が刻まれ、人類最古の会計記録を含む。</p>
      <p><strong>シュメール</strong> — メソポタミア南部に栄えた人類最古の都市文明。文字・法律・金融の原型を生んだ。</p>
      <p><strong>ハンムラビ法典</strong> — BC1750年頃のバビロニアの法典。利率上限を含む282条の法律。「目には目を」で知られる。</p>
      <p><strong>穀物貸付</strong> — 大麦などの穀物を貸し出し、収穫後に利子をつけて返済させる仕組み。最古の信用取引。</p>
