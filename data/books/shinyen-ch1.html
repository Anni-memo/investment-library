  <h1 class="chapter-title">敗戦と超インフレ --- 1945-46年</h1>
</div>

<p>1945年8月15日、日本は敗戦を迎えた。経済は壊滅状態にあった。</p>
      <p>戦時中に膨大な軍事費を賄うため、政府は日本銀行に国債を引き受けさせ、紙幣を大量に発行していた。戦争終結時、市中に流通する通貨量は戦前の4倍以上に膨張していた。</p>
      <p>一方で、生産設備は破壊され、物資は極端に不足していた。お金はあるのに買うものがない。古典的なインフレの構造だ。</p>
      <p>1945年から1946年にかけて、物価は年率300%を超えるペースで上昇した。国民の貯蓄は、数字の上では残っていても、実質的な購買力は急速に失われていった。</p>
