<ul>
        <li><strong>南海会社（South Sea Company）</strong> — 1711年設立。南米貿易の独占権を謳い、政府債務の引き受けで巨大化した会社</li>
        <li><strong>泡沫会社禁止法（Bubble Act）</strong> — 1720年制定。無許可の株式会社設立を禁じた法律。1825年に廃止</li>
        <li><strong>政府債務の株式化</strong> — 国債を民間企業の株式に転換するスキーム。南海会社の中核的な仕組み</li>
        <li><strong>アイザック・ニュートン</strong> — 万有引力の発見者。南海会社株で約2万ポンドの損失を被った</li>
      </ul>
