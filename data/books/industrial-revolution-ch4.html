  <h1 class="chapter-title">今に残るもの ── 成長と格差の構造</h1>
</div>

<p>産業革命が生み出した構造は、250年経った現在も私たちの経済の基盤である。</p>
      <ul>
        <li><strong>持続的成長への期待</strong> ── 「経済は成長し続ける」という前提は、産業革命以降に初めて成り立った</li>
        <li><strong>技術革新と雇用破壊</strong> ── ラダイト運動（機械打ちこわし運動）は、AIによる雇用不安の原型</li>
        <li><strong>格差の構造</strong> ── 資本を持つ者と持たざる者の格差は、産業革命から始まりピケティの『21世紀の資本』まで続くテーマ</li>
      </ul>
      <p>産業革命は「終わった出来事」ではない。現在進行中のAI革命は「第四次産業革命」とも呼ばれる。歴史は繰り返さないが、韻を踏む。</p>
