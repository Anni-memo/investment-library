  <span class="chapter-num">第五章</span>
  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>独占権は最強の堀（moat）だが、永続するとは限らない。規制環境の変化は独占を崩壊させうる</li>
        <li>国家と企業の癒着は短期的には利益を生むが、長期的にはガバナンスを腐食させる</li>
        <li>「国策」であることは投資の安全を保証しない。東インド会社の株主も、経営破綻の危機に直面した</li>
        <li>企業の事業が社会に与える影響（外部性）を無視した投資は、長期的にはリスクを蓄積する</li>
      </ul>
