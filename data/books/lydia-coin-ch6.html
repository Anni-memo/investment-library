  <h1 class="chapter-title">関連用語</h1>

<p><strong>エレクトラム</strong> — 金と銀の自然合金。リディアの最初の硬貨の素材。パクトロス川の砂金から採取された。</p>
      <p><strong>鋳造硬貨</strong> — 一定の重さ・純度で作られ、権威者の刻印により価値が保証された金属片。通貨の原型。</p>
      <p><strong>リディア王国</strong> — 現在のトルコ西部にBC7-6世紀に栄えた王国。世界初の鋳造硬貨を生んだ。</p>
      <p><strong>クロイソス</strong> — リディア最後の王（在位BC560-546年頃）。純金・純銀硬貨を導入し、富の象徴として歴史に名を残す。</p>
