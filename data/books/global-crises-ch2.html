  <h1 class="chapter-title">南海泡沫事件（1720年）── 国家ぐるみの詐欺的バブル</h1>
</div>

<p>イギリスの南海会社は、国家債務の引き受けと引き換えに独占的な貿易権を得た。株価は半年で10倍に急騰した。</p>
      <p>しかし、南海会社の実際の貿易利益はほとんどなかった。株価は期待と投機だけで膨らんでいた。</p>
      <ul>
        <li>アイザック・ニュートンも巻き込まれ、2万ポンド（現在の価値で数億円）を失った</li>
        <li>「天体の運動は計算できるが、人間の狂気は計算できない」という言葉を残した</li>
        <li>この事件を受けて、イギリスでは「泡沫会社禁止法」が制定された</li>
      </ul>
      <p>南海泡沫事件は、「賢い人間もバブルには巻き込まれる」という教訓を歴史に刻んだ。</p>
