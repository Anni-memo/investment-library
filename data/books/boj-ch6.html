  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<p>中央銀行政策が市場を動かす。これは比喩ではなく、構造だ。</p>
      <ul>
        <li>日銀の政策決定会合（年8回）は、円相場と日本株の最大の変動要因のひとつ</li>
        <li>金融政策の方向性（緩和か引き締めか）が、セクターローテーションを決定する</li>
        <li>YCC解除・利上げ局面では、銀行株が恩恵を受け、不動産・グロース株には逆風が吹く</li>
        <li>日銀のETF買い入れ（累計約37兆円）は、日本の株式市場の構造そのものを変えた</li>
      </ul>
      <p>中央銀行の歴史を知ることは、「なぜ市場はこう動くのか」を構造から理解することだ。松方正義の時代から続く中央銀行の論理は、今日のポートフォリオ判断に直結している。</p>
