  <h1 class="chapter-title">ゼロ金利政策（1999年〜）</h1>
</div>

<p>1999年2月、日本銀行は政策金利を実質ゼロまで引き下げた。世界初のゼロ金利政策である。</p>
      <p>背景には、バブル崩壊後の深刻なデフレと不良債権問題があった。金融システムは脆弱で、企業の資金需要は消え、物価は下がり続けた。従来の金融政策では景気を刺激できなくなっていた。</p>
      <p>速水優日銀総裁のもとで始まったこの政策は、2000年8月に一旦解除されたが、ITバブル崩壊を受けてすぐに戻された。「出口」の難しさは、この時点で既に明らかだった。</p>
