  <h1 class="chapter-title">関連用語</h1>
</div>

<p><strong>有効需要</strong> --- 実際に購買力を伴う需要。経済の産出量を決定する</p>
      <p><strong>流動性の罠</strong> --- 金利がゼロ近辺で金融政策が効かなくなる状態</p>
      <p><strong>乗数効果</strong> --- 政府支出が波及的にGDPを増加させる効果</p>
      <p><strong>財政政策</strong> --- 政府支出と課税による経済調整の手段</p>
      <p><strong>完全雇用</strong> --- 働きたい人が全員職を得ている状態（摩擦的失業を除く）</p>
      <p><strong>アニマルスピリッツ</strong> --- 合理的計算を超えた、投資家の楽観・悲観の心理</p>
