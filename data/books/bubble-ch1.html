  <h1 class="chapter-title">プラザ合意と円高不況（1985年）</h1>
</div>

<p>1985年9月、ニューヨークのプラザホテルに先進5カ国の蔵相が集まった。合意の内容は「ドル高を是正する」こと。その結果、1ドル=240円だった為替は、わずか2年で120円台へ急騰した。</p>
      <p>円高は輸出主導だった日本経済に大きな打撃を与えた。自動車、電機、鉄鋼。日本の主力産業が一斉に苦境に陥った。これが「円高不況」である。</p>
      <p>この不況への対応が、後のバブルの種を蒔くことになる。</p>
