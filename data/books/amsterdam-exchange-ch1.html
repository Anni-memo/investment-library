  <h1 class="chapter-title">何が起きたか ── 常設の株式取引所の誕生</h1>
</div>

<p>1609年、オランダのアムステルダムに世界初の常設証券取引所が開設された。取引の対象は、1602年に設立されたオランダ東インド会社（VOC）の株式だった。</p>
      <p>それ以前にも株式の売買は存在したが、決まった場所で定期的に行われる「取引所」は存在しなかった。アムステルダム取引所は、株式売買に場所と規則を与えた。</p>
      <p>驚くべきことに、ここでは空売り（ショートセリング）、先物取引、オプション取引の原型がすでに行われていた。現代の金融市場で使われるほぼすべての取引手法が、400年前のアムステルダムで芽生えていたのである。</p>
