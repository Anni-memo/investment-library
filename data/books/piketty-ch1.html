  <h1 class="chapter-title">経済学書が世界的ベストセラーになった</h1>
</div>

<p>2013年、フランスの経済学者トマ・ピケティが『21世紀の資本（Le Capital au XXIe siècle）』を出版した。700ページを超える学術書が、翌年の英訳版を契機に世界的ベストセラーとなった。</p>
      <p>ピケティが行ったのは、20カ国以上、300年以上にわたる税務データ・資産データの体系的な分析だった。そこから導かれた結論はシンプルだが衝撃的だった。</p>
      <p>資本収益率（r）は歴史的に年4〜5%で推移する一方、経済成長率（g）は年1〜2%にとどまる。r > g が続く限り、資本を持つ者と持たない者の格差は構造的に拡大し続ける。</p>
