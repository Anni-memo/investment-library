  <h1 class="chapter-title">何が起きたか ── 戦費のために生まれた銀行</h1>
</div>

<p>1694年、イングランド国王ウィリアム3世はフランスとの戦争（大同盟戦争、1688-1697）の真っただ中にいた。戦費は膨大で、国王の財政は逼迫していた。</p>
      <p>スコットランド出身の商人ウィリアム・パターソンが提案したのが、民間から資金を集めて政府に貸し付ける銀行の設立だった。出資者たちは120万ポンドを提供し、見返りとして年8%の利息と「銀行券」の発行権を得た。</p>
      <p>こうしてイングランド銀行（Bank of England）が設立された。戦争が、近代的な中央銀行を生んだのである。</p>
