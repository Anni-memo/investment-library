  <h1 class="chapter-title">今に残っているもの</h1>
</div>

<p>メソポタミアの穀物貸付から5000年。利子の仕組みは人類の経済活動の根幹として生き続けている。</p>
      <ul>
        <li>住宅ローン、国債、社債 -- あらゆる債務に利子がつく</li>
        <li>中央銀行の金利政策は経済全体を制御する最強のレバーである</li>
        <li>「時間の価値」という概念はDCF法など現代の企業価値評価の基礎である</li>
        <li>利率の上限規制（利息制限法）はハンムラビ法典の直系の子孫だ</li>
      </ul>
      <p>「interest（利子）」の語源はラテン語の「interesse（間にある）」。貸す時点と返す時点の「間」に生じる価値。シュメール人が粘土板に刻んだのは、まさにこの「間の価値」だった。</p>
