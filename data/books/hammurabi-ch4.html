  <h1 class="chapter-title">今に残っているもの</h1>
</div>

<p>ハンムラビ法典の金融規制の思想は、3700年を経て今も生きている。</p>
      <ul>
        <li>利息制限法 — 日本では年利20%が上限。ハンムラビの銀貸付上限と同じ水準だ</li>
        <li>消費者金融規制 — 過度な貸付から債務者を保護する法律は世界中にある</li>
        <li>破産法 — 返済不能な債務を法的にリセットする仕組み</li>
        <li>金融規制当局（SEC、金融庁）— 市場の公正さを国家が監視する制度</li>
      </ul>
      <p>法典の石柱は現在、パリのルーヴル美術館に収蔵されている。3700年前の石に刻まれた金融規制は、人類が市場と格闘し続けてきた証拠だ。</p>
