  <h1 class="chapter-title">関連用語</h1>

<p><strong>トラペジタイ（trapezitai）</strong> — 古代ギリシャの両替商・銀行家。「トラペザ（台・テーブル）」に由来。アゴラで営業した。</p>
      <p><strong>アゴラ</strong> — ギリシャの都市国家における公共広場。政治・商業・社交の中心地。市場と金融の場でもあった。</p>
      <p><strong>ドラクマ</strong> — アテナイの基本通貨単位。銀貨。「掴む」を意味するギリシャ語に由来。</p>
      <p><strong>金融仲介</strong> — 余剰資金を持つ者（預金者）と資金を必要とする者（借り手）を結びつける機能。銀行業の本質。</p>
