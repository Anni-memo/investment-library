  <span class="chapter-num">第三章</span>
  <h1 class="chapter-title">何が変わったか</h1>
</div>

<p>企業が国家権力と一体化する「国策企業」モデルが確立された。</p>
      <p>東インド会社は、通常の企業が持たない権限を国家から付与された。軍隊の保有、外交交渉、司法権、貨幣鋳造権。これは企業でありながら国家そのものだった。</p>
      <p>この構造は、巨大な富を生み出すと同時に、深刻な問題も引き起こした。利潤の追求が植民地支配の暴力と結びつき、1770年のベンガル大飢饉では数百万人が犠牲になったとされる。</p>
      <p>企業の利益と公共の利益が一致するとは限らない。この教訓は、1858年の会社解散とインド統治のイギリス政府への移管という形で結実した。</p>
