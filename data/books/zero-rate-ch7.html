  <h1 class="chapter-title">出口戦略の難しさ</h1>
</div>

<p>非伝統的金融政策の最大の問題は、「どうやめるか」にある。</p>
      <ul>
        <li>日銀のバランスシートはGDPを超える規模に膨張した</li>
        <li>保有する国債を売れば、金利が急騰し国債価格が暴落するリスクがある</li>
        <li>保有するETFを売れば、株式市場に大きな下落圧力がかかる</li>
        <li>金融正常化は財政コストの増大を意味し、政府の財政運営を直撃する</li>
      </ul>
      <p>「入るのは簡単だが、出るのは難しい」。これは金融緩和に限らず、あらゆる政策介入に当てはまる原則である。</p>
      <p>2024年以降、日銀は慎重に正常化を進めているが、その道のりは長い。完全な「出口」にたどり着くまで、まだ何年もかかるだろう。</p>
