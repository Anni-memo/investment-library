  <h1 class="chapter-title">土地神話 ── 「東京の地価でアメリカ全土が買える」</h1>
</div>

<p>バブル期の日本では、「土地の値段は絶対に下がらない」という信念が社会全体を支配していた。これが「土地神話」である。</p>
      <p>1980年代末、東京23区の地価総額はアメリカ全土の地価を上回ると試算された。皇居の敷地だけでカリフォルニア州全体が買えるとも言われた。</p>
      <p>銀行は土地さえ担保にあれば無制限に融資した。企業も個人も、借金をして土地と株を買い続けた。</p>
      <p>「いつまでも上がり続ける」という信念が、すべての合理的判断を曇らせた。これは、あらゆるバブルに共通する構造である。</p>
