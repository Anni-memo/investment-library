  <h1 class="chapter-title">関連用語</h1>
</div>

<p><strong>金本位制</strong> — 通貨の価値を一定量の金に固定する制度</p>
      <p><strong>兌換紙幣</strong> — 金や銀との交換が保証された紙幣</p>
      <p><strong>不換紙幣（フィアットマネー）</strong> — 金属の裏付けを持たない、政府の信用のみで流通する紙幣</p>
      <p><strong>金平価</strong> — 各国通貨と金の交換比率</p>
      <p><strong>ブレトンウッズ体制</strong> — ドルを金に固定し、各国通貨をドルに固定した戦後の国際通貨体制</p>
      <p><strong>ニクソン・ショック</strong> — 1971年にドルと金の交換停止を宣言した出来事</p>
      <p><strong>SDR</strong> — IMFが創設した国際準備資産（特別引出権）</p>
      <p><strong>高橋是清</strong> — 金本位制離脱と積極財政で日本を世界恐慌から救った大蔵大臣</p>
