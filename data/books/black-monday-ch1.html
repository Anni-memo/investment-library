  <h1 class="chapter-title">1987年10月19日 ── 一日で22.6%が消えた</h1>
</div>

<p>1987年10月19日月曜日、ニューヨーク証券取引所でダウ工業株30種平均が508ポイント下落した。下落率は22.6%。1日の下落率としては史上最大であり、この記録は今なお破られていない。</p>
      <p>暴落はアメリカだけにとどまらなかった。香港、オーストラリア、イギリス、日本。世界中の市場が連鎖的に崩壊した。日経平均も翌日に3,836円（14.9%）下落している。</p>
      <p>1929年の大暴落が数日かけて進行したのに対し、ブラック・マンデーはたった1日で市場を破壊した。その速度こそが、この暴落の本質だった。</p>
