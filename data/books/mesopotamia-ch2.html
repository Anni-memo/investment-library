  <h1 class="chapter-title">なぜ起きたか</h1>
</div>

<p>農業社会には、構造的な「時間のギャップ」がある。種をまく時期と収穫の時期は一致しない。</p>
      <p>春に種もみが必要な農民は、まだ収穫物を持っていない。一方、前年の余剰を持つ者がいる。この需給のずれを埋める仕組みが求められた。</p>
      <ul>
        <li>種まき時に大麦を借り、収穫後に返済する</li>
        <li>貸し手はリスクを負う代わりに「追加分」を受け取る</li>
        <li>神殿や王宮が貸し手として機能した</li>
      </ul>
      <p>利子は「時間の価値」を数値化したものだった。今の大麦と半年後の大麦は同じ価値ではない。この認識が、金融の出発点になった。</p>
