  <h1 class="chapter-title">投資家にとっての意味</h1>
</div>

<ul>
        <li>規制と市場の緊張は金融の本質である。規制強化は投資環境を変え、規制緩和はリスクを増大させる</li>
        <li>「強者が弱者を虐げないようにする」という動機は、現代の投資家保護制度と同根だ</li>
        <li>債務の膨張と帳消しのサイクルは、3700年前から繰り返されている。レバレッジの危険性は歴史的教訓だ</li>
        <li>取引の透明性・記録の義務化は、市場の信頼を支える土台であり、今日のディスクロージャー制度に直結する</li>
      </ul>
