<p><strong>連邦準備制度</strong> --- アメリカの中央銀行制度。理事会と12の地区連銀で構成</p>
      <p><strong>FOMC</strong> --- 連邦公開市場委員会。金融政策の決定機関</p>
      <p><strong>公開市場操作</strong> --- 国債等の売買を通じた資金量の調整手法</p>
      <p><strong>最後の貸し手</strong> --- 金融危機時に銀行に緊急融資する中央銀行の機能</p>
      <p><strong>フェデラルファンド金利</strong> --- 銀行間の翌日物貸出金利。FRBの政策金利の指標</p>
