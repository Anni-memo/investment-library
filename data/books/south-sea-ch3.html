  <h1 class="chapter-title">何が変わったか ── 泡沫会社禁止法の制定</h1>
</div>

<p>南海泡沫事件は、バブルが規制を生んだ最初の事例となった。</p>
      <p>崩壊後、イギリス議会は1720年に「泡沫会社禁止法（Bubble Act）」を制定した。王室の特許状なしに株式会社を設立することを禁じたのである。</p>
      <p>この法律は、結果として約100年間にわたりイギリスの企業設立を厳しく制限した。産業革命期には、この規制が逆に経済発展の足かせとなったと指摘されている。</p>
      <p>規制は過剰投機を防ぐためのものだったが、イノベーションも同時に抑制した。この「規制のジレンマ」は、300年後の現代にも通じるテーマである。</p>
