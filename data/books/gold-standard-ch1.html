  <span class="chapter-num">第一章</span>
  <h1 class="chapter-title">金本位制の仕組み --- 金とお金の交換保証</h1>
</div>

<p>金本位制とは、通貨の価値を一定量の金に固定する制度だ。</p>
      <p>たとえば「1ドル＝金1/20.67オンス」と定めれば、紙幣を銀行に持っていけば、いつでもその量の金と交換できる。政府や中央銀行が保有する金の量が、発行できる紙幣の量の上限を決める。</p>
      <p>これは通貨に対する究極の信用保証だった。紙幣は単なる紙ではなく、金庫に眠る金の「引換券」だったのだ。</p>
      <p>19世紀のイギリスが金本位制の中心にいた。1816年に法的に金本位制を確立し、基軸通貨としてのポンドの信用を世界に広げた。</p>
