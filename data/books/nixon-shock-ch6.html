<p><strong>ニクソン・ショック</strong> --- 1971年8月15日のドル・金交換停止と一連の経済政策の総称</p>
      <p><strong>フィアットマネー</strong> --- 金属の裏付けを持たない法定通貨。政府の信用のみで流通</p>
      <p><strong>変動相場制</strong> --- 為替レートが市場の需給で決まる制度</p>
      <p><strong>金兌換停止</strong> --- ドルと金の交換義務を停止したこと</p>
      <p><strong>スミソニアン合意</strong> --- ニクソン・ショック後の暫定的な固定相場の再調整合意（1971年12月）</p>
