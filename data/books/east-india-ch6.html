  <h1 class="chapter-title">関連用語</h1>

<p><strong>特許状（チャーター）</strong> — 国王が特定の団体に独占的権利を付与する公式文書。現代の事業免許の原型。</p>
      <p><strong>香辛料貿易</strong> — 胡椒・クローブ・ナツメグなどをアジアからヨーロッパに運ぶ貿易。大航海時代の最大の動機。</p>
      <p><strong>植民地経営</strong> — 本国の利益のために海外領土を統治・搾取する体制。東インド会社はその最大の実行者だった。</p>
      <p><strong>東インド会社法</strong> — イギリス議会が東インド会社の権限を制限・規制するために制定した一連の法律。企業規制の先駆け。</p>
