  <span class="chapter-num">第一章</span>
  <h1 class="chapter-title">国立銀行の紙幣乱発とインフレ</h1>
</div>

<p>明治維新後、新政府は近代化のための資金調達に迫られた。1872年、アメリカの国立銀行制度を模倣して「国立銀行条例」が制定された。</p>
      <p>当初は正貨（金貨・銀貨）との兌換を義務づけていたが、1876年の改正で不換紙幣の発行が認められると、状況は一変する。全国に153もの国立銀行が乱立し、それぞれが独自の紙幣を発行した。</p>
      <p>結果は激しいインフレだった。紙幣の発行量は統制を失い、物価は急騰し、通貨への信頼は地に落ちた。西南戦争（1877年）の戦費調達がこの状況をさらに悪化させた。</p>
