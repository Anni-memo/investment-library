<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>金融史クロノス — 第1話：チューリップ狂乱</title>
<meta name="description" content="時間を越えて金融史の現場へ潜入し、熱狂の裏にある矛盾を暴く知的ミステリーアドベンチャー。"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+JP:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a1208;
  --ink2: #2d2010;
  --ink3: #4a3520;
  --parch: #f5ede0;
  --parch2: #efe4d0;
  --parch3: #e8d8be;
  --parch4: #dfc9a8;
  --gold: #8b6914;
  --gold2: #b8900a;
  --gold3: #d4aa22;
  --gold4: #f0cc55;
  --rust: #8b3a1a;
  --green: #2a4a1a;
  --blue: #1a2a4a;
  --red: #a03030;
  --font-serif: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --font-mono: 'DM Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-serif);
  background: var(--ink);
  color: var(--parch);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ===== GAME CONTAINER ===== */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ===== SCENE BACKGROUNDS ===== */
.scene-bg {
  position: absolute;
  inset: 0;
  transition: opacity 0.8s ease;
  z-index: 0;
}

.bg-bureau {
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 40%, #16213e 100%);
}
.bg-bureau::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 80%, rgba(212,170,34,0.08) 0%, transparent 60%);
}

.bg-market {
  background: linear-gradient(180deg, #87CEEB 0%, #e8d8be 40%, #c4a882 100%);
}
.bg-market::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 60%, rgba(255,120,80,0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 40%, rgba(255,200,100,0.08) 0%, transparent 40%);
}

.bg-tavern {
  background: linear-gradient(180deg, #1a1208 0%, #2d1f0e 30%, #3d2a15 100%);
}
.bg-tavern::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 70%, rgba(255,160,50,0.15) 0%, transparent 50%);
}

.bg-notary {
  background: linear-gradient(180deg, #1a1a1a 0%, #2a2018 40%, #352a1e 100%);
}
.bg-notary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 60% 50%, rgba(200,180,140,0.08) 0%, transparent 40%);
}

.bg-manor {
  background: linear-gradient(180deg, #1a0a0a 0%, #2a1510 40%, #3d2520 100%);
}
.bg-manor::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(212,170,34,0.12) 0%, transparent 50%);
}

.bg-confrontation {
  background: linear-gradient(180deg, #0a0505 0%, #1a0808 30%, #2a1010 100%);
}
.bg-confrontation::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(160,48,48,0.12) 0%, transparent 60%);
}

.bg-truth {
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a30 50%, #0d0d1a 100%);
}
.bg-truth::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(212,170,34,0.15) 0%, transparent 50%);
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #0a0505 0%, #1a0a08 30%, #0d0d1a 70%, #050510 100%);
  z-index: 100;
  transition: opacity 1s ease;
}

.title-ornament {
  font-family: var(--font-mono);
  font-size: clamp(0.6rem, 1.2vw, 0.85rem);
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
  opacity: 0.7;
}

.title-main {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  color: var(--parch);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 0.5rem;
  text-shadow: 0 2px 20px rgba(212,170,34,0.2);
}

.title-sub {
  font-size: clamp(0.9rem, 2vw, 1.3rem);
  color: var(--gold3);
  margin-bottom: 0.5rem;
  font-weight: 400;
  font-style: italic;
}

.title-episode {
  font-family: var(--font-mono);
  font-size: clamp(0.7rem, 1.2vw, 0.9rem);
  color: var(--parch4);
  letter-spacing: 0.3em;
  margin-bottom: 3rem;
  opacity: 0.6;
}

.title-concept {
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  color: var(--parch3);
  margin-bottom: 3rem;
  text-align: center;
  max-width: 500px;
  line-height: 1.8;
  opacity: 0.7;
}

.btn {
  font-family: var(--font-mono);
  font-size: clamp(0.75rem, 1.2vw, 0.9rem);
  padding: 0.8em 2.5em;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold3);
  cursor: pointer;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: rgba(212,170,34,0.1);
  border-color: var(--gold3);
  color: var(--gold4);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(212,170,34,0.15);
}
.btn:active { transform: translateY(0); }

/* ===== TOP BAR ===== */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  background: rgba(10,5,5,0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(212,170,34,0.15);
  z-index: 50;
  font-family: var(--font-mono);
  font-size: 0.7rem;
}

.top-bar-left {
  color: var(--gold);
  letter-spacing: 0.15em;
  opacity: 0.8;
}

.top-bar-right {
  display: flex;
  gap: 1rem;
  align-items: center;
}

.evidence-count {
  color: var(--gold3);
  cursor: pointer;
  padding: 0.3em 0.8em;
  border: 1px solid rgba(212,170,34,0.3);
  border-radius: 2px;
  transition: all 0.3s;
}
.evidence-count:hover {
  background: rgba(212,170,34,0.1);
  border-color: var(--gold3);
}
.evidence-count.pulse {
  animation: pulse-gold 0.6s ease;
}

@keyframes pulse-gold {
  0% { box-shadow: 0 0 0 0 rgba(212,170,34,0.5); }
  100% { box-shadow: 0 0 0 12px rgba(212,170,34,0); }
}

/* ===== DIALOGUE BOX ===== */
.dialogue-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 40;
  padding: 0 1rem 1rem;
}

.dialogue-box {
  max-width: 800px;
  margin: 0 auto;
  background: rgba(10,8,5,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(212,170,34,0.2);
  border-radius: 4px;
  padding: 1.2rem 1.5rem;
  min-height: 140px;
  position: relative;
}

.dialogue-speaker {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--gold3);
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}

.dialogue-text {
  font-size: clamp(0.9rem, 1.8vw, 1.05rem);
  line-height: 1.9;
  color: var(--parch);
  min-height: 3em;
}

.dialogue-text .char {
  opacity: 0;
  display: inline;
}
.dialogue-text .char.visible {
  opacity: 1;
}

.dialogue-indicator {
  position: absolute;
  bottom: 0.8rem;
  right: 1.2rem;
  font-size: 0.7rem;
  color: var(--gold);
  opacity: 0.5;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0; }
}

/* ===== CHOICES ===== */
.choices-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 40;
  padding: 0 1rem 1rem;
}

.choices-box {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.choice-btn {
  font-family: var(--font-serif);
  font-size: clamp(0.85rem, 1.5vw, 1rem);
  padding: 0.9em 1.5em;
  background: rgba(10,8,5,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(212,170,34,0.25);
  color: var(--parch);
  cursor: pointer;
  text-align: left;
  transition: all 0.3s ease;
  border-radius: 3px;
  line-height: 1.6;
}
.choice-btn:hover {
  background: rgba(212,170,34,0.08);
  border-color: var(--gold3);
  color: var(--gold4);
  transform: translateX(4px);
}

/* ===== MAP SCREEN ===== */
.map-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 30;
  padding: 60px 1rem 1rem;
}

.map-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--gold);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.map-subtitle {
  font-size: clamp(1.2rem, 2.5vw, 1.6rem);
  color: var(--parch);
  margin-bottom: 2rem;
  text-align: center;
}

.map-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
  max-width: 600px;
  width: 100%;
}

.map-location {
  background: rgba(10,8,5,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(212,170,34,0.2);
  border-radius: 4px;
  padding: 1.2rem;
  cursor: pointer;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}
.map-location:hover {
  border-color: var(--gold3);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(212,170,34,0.1);
}
.map-location.visited {
  border-color: rgba(212,170,34,0.1);
  opacity: 0.6;
}
.map-location.visited::after {
  content: 'INVESTIGATED';
  position: absolute;
  top: 0.5rem; right: 0.5rem;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  color: var(--green);
  background: rgba(42,74,26,0.2);
  padding: 0.2em 0.5em;
  border-radius: 2px;
}
.map-location.locked {
  opacity: 0.3;
  pointer-events: none;
}

.map-loc-icon {
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
}
.map-loc-name {
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  font-weight: 600;
  color: var(--parch);
  margin-bottom: 0.3rem;
}
.map-loc-desc {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--parch4);
  letter-spacing: 0.05em;
  line-height: 1.5;
}

.map-action {
  margin-top: 1.5rem;
  text-align: center;
}

.map-hint {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--gold);
  opacity: 0.6;
  margin-top: 1rem;
  text-align: center;
}

/* ===== EVIDENCE BOARD ===== */
.evidence-panel {
  position: absolute;
  inset: 0;
  z-index: 60;
  background: rgba(5,3,2,0.95);
  backdrop-filter: blur(16px);
  display: none;
  flex-direction: column;
  padding: 60px 1.5rem 1.5rem;
  overflow-y: auto;
}
.evidence-panel.open { display: flex; }

.evidence-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}

.evidence-title {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--gold3);
  text-transform: uppercase;
}

.evidence-close {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--parch3);
  cursor: pointer;
  padding: 0.3em 0.8em;
  border: 1px solid rgba(212,170,34,0.2);
  background: transparent;
  transition: all 0.3s;
}
.evidence-close:hover {
  border-color: var(--gold3);
  color: var(--gold4);
}

.evidence-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 0.8rem;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.evidence-card {
  background: rgba(20,15,10,0.8);
  border: 1px solid rgba(212,170,34,0.15);
  border-radius: 3px;
  padding: 1rem;
  cursor: default;
  transition: all 0.3s;
}
.evidence-card:hover {
  border-color: rgba(212,170,34,0.4);
}
.evidence-card.selecting {
  cursor: pointer;
}
.evidence-card.selecting:hover {
  border-color: var(--gold3);
  background: rgba(212,170,34,0.08);
  transform: scale(1.02);
}
.evidence-card.selected {
  border-color: var(--gold3);
  background: rgba(212,170,34,0.12);
  box-shadow: 0 0 20px rgba(212,170,34,0.15);
}

.evidence-card-tag {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
}

.evidence-card-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--parch);
  margin-bottom: 0.4rem;
}

.evidence-card-desc {
  font-size: 0.8rem;
  color: var(--parch3);
  line-height: 1.6;
}

/* ===== CONFRONTATION ===== */
.confrontation-header {
  position: absolute;
  top: 60px;
  left: 0; right: 0;
  text-align: center;
  z-index: 35;
}

.confrontation-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  color: var(--rust);
  text-transform: uppercase;
}

.credibility-bar {
  max-width: 300px;
  margin: 0.8rem auto;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.credibility-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rust), var(--gold3));
  transition: width 0.5s ease;
  border-radius: 3px;
}

.credibility-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--parch3);
  letter-spacing: 0.15em;
}

/* ===== OBJECTION FLASH ===== */
.objection-overlay {
  position: absolute;
  inset: 0;
  z-index: 70;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(160,48,48,0.15);
}
.objection-overlay.show {
  display: flex;
  animation: flash-in 0.5s ease;
}

.objection-text {
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 700;
  color: var(--gold4);
  text-shadow: 0 0 30px rgba(212,170,34,0.5), 0 2px 10px rgba(0,0,0,0.8);
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.4;
}

@keyframes flash-in {
  0% { opacity: 0; transform: scale(1.5); }
  30% { opacity: 1; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}

/* ===== CHARACTER AREA ===== */
.character-area {
  position: absolute;
  top: 48px;
  bottom: 180px;
  left: 0; right: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 10;
  padding: 0 2rem;
}

.character {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: all 0.5s ease;
}

.char-portrait {
  width: clamp(80px, 12vw, 120px);
  height: clamp(80px, 12vw, 120px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(2rem, 4vw, 3rem);
  border: 2px solid rgba(212,170,34,0.3);
  margin-bottom: 0.5rem;
  position: relative;
}

.char-name {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--parch3);
}

/* ===== EVIDENCE GET NOTIFICATION ===== */
.evidence-get {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 65;
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 2rem 3rem;
  background: rgba(5,3,2,0.95);
  border: 1px solid var(--gold3);
  border-radius: 4px;
  box-shadow: 0 0 40px rgba(212,170,34,0.2);
}
.evidence-get.show {
  display: flex;
  animation: evidence-pop 0.5s ease;
}

@keyframes evidence-pop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  50% { transform: translate(-50%, -50%) scale(1.05); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.evidence-get-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  margin-bottom: 0.8rem;
  text-transform: uppercase;
}

.evidence-get-name {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--gold4);
  margin-bottom: 0.5rem;
}

.evidence-get-desc {
  font-size: 0.85rem;
  color: var(--parch3);
  line-height: 1.6;
  max-width: 350px;
}

/* ===== SCREEN TRANSITIONS ===== */
.fade-overlay {
  position: absolute;
  inset: 0;
  background: var(--ink);
  z-index: 80;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.fade-overlay.active { opacity: 1; pointer-events: all; }

/* ===== TRUTH SCREEN ===== */
.truth-container {
  position: absolute;
  inset: 0;
  z-index: 35;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 2rem 2rem;
  text-align: center;
}

.truth-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.5em;
  color: var(--gold);
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.truth-title {
  font-size: clamp(1.3rem, 3vw, 2rem);
  font-weight: 700;
  color: var(--parch);
  margin-bottom: 2rem;
  text-shadow: 0 2px 20px rgba(212,170,34,0.2);
}

.truth-text {
  font-size: clamp(0.9rem, 1.5vw, 1.05rem);
  color: var(--parch2);
  line-height: 2.2;
  max-width: 600px;
  margin-bottom: 2rem;
  text-align: left;
}

.truth-text p {
  margin-bottom: 1em;
}

.truth-text .highlight {
  color: var(--gold4);
  font-weight: 600;
}

/* ===== EPILOGUE / LIBRARY LINK ===== */
.epilogue-container {
  position: absolute;
  inset: 0;
  z-index: 35;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 2rem 2rem;
  text-align: center;
}

.epilogue-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.epilogue-title {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--parch);
  margin-bottom: 1.5rem;
  font-weight: 600;
}

.epilogue-text {
  font-size: clamp(0.85rem, 1.3vw, 0.95rem);
  color: var(--parch3);
  line-height: 2;
  max-width: 550px;
  margin-bottom: 2rem;
}

.library-links {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  max-width: 450px;
  width: 100%;
  margin-bottom: 2rem;
}

.library-link {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem 1.2rem;
  background: rgba(20,15,10,0.8);
  border: 1px solid rgba(212,170,34,0.2);
  border-radius: 3px;
  color: var(--parch);
  text-decoration: none;
  transition: all 0.3s;
  text-align: left;
}
.library-link:hover {
  border-color: var(--gold3);
  background: rgba(212,170,34,0.08);

<script>
// ===== GAME ENGINE =====
const G = {
  state: 'title',
  evidence: [],
  visited: new Set(),
  credibility: 100,
  confrontRound: 0,
  typing: false,
  typingResolve: null,
  fullText: '',
  charIndex: 0,
  typeTimer: null,
  selectingEvidence: false,
  currentCorrectEvidence: null,
};

// ===== EVIDENCE DATABASE =====
const EVIDENCE_DB = {
  price_chart: {
    id: 'price_chart',
    tag: 'Market Record',
    name: '球根価格推移表',
    desc: 'センペル・アウグストゥスの価格が3ヶ月で20倍に高騰している記録。指数関数的な上昇曲線を描いている。',
  },
  maria_testimony: {
    id: 'maria_testimony',
    tag: 'Testimony',
    name: 'マリアの証言',
    desc: '「最近の買い手のほとんどは庭師ではなく転売目的の投機家。花を植える人はもういない。」',
  },
  tavern_rumors: {
    id: 'tavern_rumors',
    tag: 'Field Note',
    name: '酒場の噂メモ',
    desc: '従業員が給料全額を球根に投じた話。靴屋も肉屋も球根の話しかしない。庶民まで投機に参加している。',
  },
  income_data: {
    id: 'income_data',
    tag: 'Economic Data',
    name: '職人年収データ',
    desc: '熟練職人の年収は約300ギルダー。一方、センペル・アウグストゥス1個は10,000ギルダー。年収の33倍。',
  },
  futures_contract: {
    id: 'futures_contract',
    tag: 'Document',
    name: '先物契約書',
    desc: '実物の球根を一度も確認せずに取引されている契約書。引き渡し期日も曖昧で、転売だけが繰り返されている。',
  },
  ledger_analysis: {
    id: 'ledger_analysis',
    tag: 'Financial Record',
    name: 'ピーテルの帳簿分析',
    desc: 'ヘンドリック・ファン・デル・ベルグの借入記録。球根購入のために莫大な借金を重ねている。資産の大半が未実現利益。',
  },
  demand_survey: {
    id: 'demand_survey',
    tag: 'Analysis',
    name: '実需調査メモ',
    desc: '球根の最終的な買い手（庭に植える人）は市場参加者の5%未満。95%以上が転売目的で購入している。',
  },
  hendrick_letter: {
    id: 'hendrick_letter',
    tag: 'Private Document',
    name: 'ヘンドリックの私信',
    desc: '知人宛の手紙。「来月中にすべての球根を売り抜ける。この熱狂がいつまでも続くとは思えない。」と書かれている。',
  },
};

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const fadeOverlay = $('fadeOverlay');
const topBar = $('topBar');
const sceneBg = $('sceneBg');
const charArea = $('charArea');
const mapScreen = $('mapScreen');
const dialogueArea = $('dialogueArea');
const choicesArea = $('choicesArea');
const speakerName = $('speakerName');
const dialogueText = $('dialogueText');
const dialogueIndicator = $('dialogueIndicator');
const choicesBox = $('choicesBox');
const evidencePanel = $('evidencePanel');
const evidenceGrid = $('evidenceGrid');
const evidenceGet = $('evidenceGet');
const objectionOverlay = $('objectionOverlay');
const confrontHeader = $('confrontHeader');
const truthScreen = $('truthScreen');
const epilogueScreen = $('epilogueScreen');

// ===== UTILITIES =====
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fadeIn() {
  fadeOverlay.classList.add('active');
  await sleep(600);
}

async function fadeOut() {
  fadeOverlay.classList.remove('active');
  await sleep(600);
}

function hideAll() {
  mapScreen.style.display = 'none';
  dialogueArea.style.display = 'none';
  choicesArea.style.display = 'none';
  charArea.style.display = 'none';
  confrontHeader.style.display = 'none';
  truthScreen.style.display = 'none';
  epilogueScreen.style.display = 'none';
}

function setBg(cls) {
  sceneBg.className = 'scene-bg ' + cls;
}

function setCharacters(chars) {
  charArea.style.display = 'flex';
  charArea.style.gap = '3rem';
  charArea.style.justifyContent = 'center';
  charArea.innerHTML = chars.map(c => `
    <div class="character">
      <div class="char-portrait" style="background:${c.bg}">${c.icon}</div>
      <div class="char-name">${c.name}</div>
    </div>
  `).join('');
}

function updateEvidenceCount() {
  $('evidenceCountNum').textContent = G.evidence.length;
}

// ===== TEXT SYSTEM =====
function typeText(text, speed = 30) {
  return new Promise(resolve => {
    G.typing = true;
    G.fullText = text;
    G.charIndex = 0;
    G.typingResolve = resolve;
    dialogueText.innerHTML = '';
    dialogueIndicator.style.display = 'none';

    clearInterval(G.typeTimer);
    G.typeTimer = setInterval(() => {
      if (G.charIndex < G.fullText.length) {
        dialogueText.textContent = G.fullText.substring(0, G.charIndex + 1);
        G.charIndex++;
      } else {
        clearInterval(G.typeTimer);
        G.typing = false;
        dialogueIndicator.style.display = 'block';
      }
    }, speed);
  });
}

function skipType() {
  if (G.typing) {
    clearInterval(G.typeTimer);
    dialogueText.textContent = G.fullText;
    G.typing = false;
    dialogueIndicator.style.display = 'block';
  }
}

function completeDialogue() {
  if (G.typingResolve) {
    const r = G.typingResolve;
    G.typingResolve = null;
    r();
  }
}

// Click handler for dialogue
document.addEventListener('click', e => {
  if (G.selectingEvidence) return;
  if (evidencePanel.classList.contains('open')) return;
  if (evidenceGet.classList.contains('show')) {
    evidenceGet.classList.remove('show');
    return;
  }

  if (G.typing) {
    skipType();
  } else if (G.typingResolve) {
    completeDialogue();
  }
});

// ===== DIALOGUE SYSTEM =====
async function say(speaker, text, speakerColor) {
  dialogueArea.style.display = 'block';
  speakerName.textContent = speaker;
  if (speakerColor) speakerName.style.color = speakerColor;
  else speakerName.style.color = 'var(--gold3)';

  await typeText(text);
  await new Promise(resolve => { G.typingResolve = resolve; });
}

async function narrate(text) {
  await say('', text, 'var(--parch3)');
}

function showChoices(options) {
  return new Promise(resolve => {
    dialogueArea.style.display = 'none';
    choicesArea.style.display = 'block';
    choicesBox.innerHTML = options.map((opt, i) => `
      <button class="choice-btn" data-idx="${i}">${opt.text}</button>
    `).join('');

    choicesBox.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        choicesArea.style.display = 'none';
        resolve(parseInt(btn.dataset.idx));
      });
    });
  });
}

// ===== EVIDENCE SYSTEM =====
async function gainEvidence(id) {
  if (G.evidence.find(e => e.id === id)) return;
  const ev = EVIDENCE_DB[id];
  G.evidence.push(ev);
  updateEvidenceCount();

  // Pulse the counter
  const btn = $('evidenceBtn');
  btn.classList.add('pulse');
  setTimeout(() => btn.classList.remove('pulse'), 600);

  // Show notification
  $('evidenceGetName').textContent = ev.name;
  $('evidenceGetDesc').textContent = ev.desc;
  evidenceGet.classList.add('show');

  await sleep(200);
  // Wait for click
  await new Promise(resolve => {
    const handler = () => {
      evidenceGet.classList.remove('show');
      resolve();
    };
    setTimeout(() => {
      document.addEventListener('click', handler, { once: true });
    }, 300);
  });
}

function renderEvidencePanel(selecting = false) {
  evidenceGrid.innerHTML = G.evidence.map(ev => `
    <div class="evidence-card ${selecting ? 'selecting' : ''}" data-id="${ev.id}">
      <div class="evidence-card-tag">${ev.tag}</div>
      <div class="evidence-card-name">${ev.name}</div>
      <div class="evidence-card-desc">${ev.desc}</div>
    </div>
  `).join('');

  if (G.evidence.length === 0) {
    evidenceGrid.innerHTML = '<div style="color:var(--parch3);font-style:italic;padding:2rem;">まだ証拠を収集していません。</div>';
  }
}

// Evidence panel open/close
$('evidenceBtn').addEventListener('click', e => {
  e.stopPropagation();
  if (!G.selectingEvidence) {
    renderEvidencePanel(false);
    evidencePanel.classList.add('open');
  }
});
$('evidenceClose').addEventListener('click', e => {
  e.stopPropagation();
  evidencePanel.classList.remove('open');
});

// ===== SCENES =====

// --- BRIEFING ---
async function sceneBriefing() {
  await fadeIn();
  hideAll();
  topBar.style.display = 'flex';
  setBg('bg-bureau');
  setCharacters([
    { icon: '👤', bg: 'rgba(26,42,74,0.6)', name: 'DIRECTOR' },
  ]);
  await fadeOut();

  await say('局長', '新しい任務だ。');
  await say('局長', '1637年、オランダ共和国。チューリップの球根ひとつが、アムステルダムの運河沿いの邸宅と同じ値段で取引されていた時代だ。');
  await say('局長', '公式記録では「一時的な投機熱」とされている。だが当時の証言には矛盾が多い。');
  await say('局長', '君の任務は、ハールレムの現場に潜入し、この熱狂の構造を解明することだ。');

  setCharacters([
    { icon: '👤', bg: 'rgba(26,42,74,0.6)', name: 'DIRECTOR' },
    { icon: '📋', bg: 'rgba(42,74,26,0.4)', name: 'RIO' },
  ]);

  await say('リオ', 'チューリップが家より高い...？本当にそんなことが？', '#a0d080');
  await say('局長', 'それこそが、この事件の核心だ。なぜ人々は信じたのか。なぜ誰も止めなかったのか。');
  await say('局長', '現地で証拠を集め、中心人物の矛盾を暴け。健闘を祈る。');

  await sceneMap();
}

// --- MAP ---
async function sceneMap() {
  await fadeIn();
  hideAll();
  setBg('bg-market');
  await fadeOut();

  showMap();
}

function showMap() {
  hideAll();
  mapScreen.style.display = 'flex';

  const locations = [
    { id: 'market', icon: '🌷', name: '花市場', desc: 'ハールレムの球根取引の中心地。売り手と買い手が熱気に包まれている。' },
    { id: 'tavern', icon: '🍺', name: '酒場「金の鋤」', desc: '庶民が集まる酒場。噂と本音が飛び交う。' },
    { id: 'notary', icon: '📜', name: '公証人事務所', desc: '取引記録と契約書が保管されている。数字は嘘をつかない。' },
    { id: 'manor', icon: '🏛️', name: 'ファン・デル・ベルグ邸', desc: '球根王と呼ばれる大投機家の豪邸。何かが隠されている。' },
  ];

  const visitedCount = G.visited.size;
  const canConfront = visitedCount >= 4;

  mapScreen.innerHTML = `
    <div class="map-title">Investigation Phase</div>
    <div class="map-subtitle">1637年 ハールレム &mdash; 調査地を選べ</div>
    <div class="map-grid">
      ${locations.map(loc => `
        <div class="map-location ${G.visited.has(loc.id) ? 'visited' : ''}" data-loc="${loc.id}">
          <div class="map-loc-icon">${loc.icon}</div>
          <div class="map-loc-name">${loc.name}</div>
          <div class="map-loc-desc">${loc.desc}</div>
        </div>
      `).join('')}
    </div>
    <div class="map-action">
      ${canConfront
        ? '<button class="btn" id="confrontBtn">対決に進む</button>'
        : ''}
    </div>
    <div class="map-hint">
      ${canConfront
        ? '全ての調査地を訪問しました。対決に進めます。'
        : `調査済み: ${visitedCount} / 4　全地点を調査すると対決に進めます。`}
    </div>
  `;

  // Location click handlers
  mapScreen.querySelectorAll('.map-location:not(.visited)').forEach(el => {
    el.addEventListener('click', () => {
      const loc = el.dataset.loc;
      visitLocation(loc);
    });
  });

  // Confront button
  const confrontBtn = $('confrontBtn');
  if (confrontBtn) {
    confrontBtn.addEventListener('click', () => scenePreConfront());
  }
}

async function visitLocation(loc) {
  switch (loc) {
    case 'market': await sceneMarket(); break;
    case 'tavern': await sceneTavern(); break;
    case 'notary': await sceneNotary(); break;
    case 'manor': await sceneManor(); break;

}

// --- FLOWER MARKET ---

async function sceneConfrontation() {
  await fadeIn();
  hideAll();
  G.state = 'confrontation';
  G.confrontRound = 0;
  G.credibility = 100;
  setBg('bg-confrontation');

  setCharacters([
    { icon: '🎩', bg: 'rgba(139,58,26,0.5)', name: 'HENDRICK' },
  ]);

  confrontHeader.style.display = 'block';
  confrontHeader.innerHTML = `
    <div class="confrontation-label">Confrontation &mdash; 対決</div>
    <div class="credibility-bar"><div class="credibility-fill" id="credFill" style="width:100%"></div></div>
    <div class="credibility-label">HENDRICK'S CREDIBILITY: <span id="credPercent">100</span>%</div>
  `;

  await fadeOut();

  await say('ヘンドリック', 'ほう...市場記録監査局の調査官が、私に何の用だ？', '#e07040');
  await say('ヘンドリック', '私の取引に問題があるとでも？馬鹿な。この市場は完全に健全だ。', '#e07040');
  await say('', 'ヘンドリックの主張を聞き、矛盾を見つけたら証拠を突きつけろ。');

  for (let i = 0; i < CONFRONT_ROUNDS.length; i++) {
    await playConfrontRound(i);
  }

  await sceneConfrontEnd();
}

async function playConfrontRound(roundIdx) {
  const round = CONFRONT_ROUNDS[roundIdx];
  G.currentCorrectEvidence = round.correctEvidence;

  await say('ヘンドリック', round.statement, '#e07040');

  // Show evidence selection
  await narrate('証拠を提示せよ。右上の「EVIDENCE」をクリックして証拠を選べ。');

  // Enable evidence selection mode
  G.selectingEvidence = true;
  dialogueArea.style.display = 'none';

  const selectedId = await selectEvidence();
  G.selectingEvidence = false;

  if (selectedId === round.correctEvidence) {
    // Correct!
    await showObjection(round.objection);

    G.credibility -= 25;
    updateCredibility();

    // Screen shake
    document.getElementById('game').classList.add('shake');
    setTimeout(() => document.getElementById('game').classList.remove('shake'), 400);

    await say('', round.explanation);
    await say('ヘンドリック', round.reaction, '#e07040');

    if (roundIdx < CONFRONT_ROUNDS.length - 1) {
      await say('ヘンドリック', 'だが...まだだ！私の言い分を聞け！', '#e07040');
    }
  } else {
    // Wrong evidence
    await say('リオ', 'この証拠ではないようです...。もう一度考えましょう。', '#a0d080');
    // Retry the same round
    await playConfrontRound(roundIdx);
  }
}

function selectEvidence() {
  return new Promise(resolve => {
    renderEvidencePanel(true);
    evidencePanel.classList.add('open');

    const handleClick = (e) => {
      const card = e.target.closest('.evidence-card');
      if (card) {
        const id = card.dataset.id;
        evidencePanel.classList.remove('open');
        resolve(id);
      }
    };

    evidenceGrid.addEventListener('click', handleClick, { once: false });

    // Override close button to not resolve
    const closeHandler = () => {
      // Re-prompt
      renderEvidencePanel(true);
    };

    // Clean up when panel closes with selection
    const observer = new MutationObserver(() => {
      if (!evidencePanel.classList.contains('open')) {
        evidenceGrid.removeEventListener('click', handleClick);
        observer.disconnect();
      }
    });
    observer.observe(evidencePanel, { attributes: true, attributeFilter: ['class'] });
  });
}

async function showObjection(text) {
  const overlay = objectionOverlay;
  $('objectionText').textContent = text;
  overlay.classList.add('show');
  await sleep(1500);
  overlay.classList.remove('show');
  await sleep(300);
}

function updateCredibility() {
  const fill = $('credFill');
  const percent = $('credPercent');
  if (fill) fill.style.width = G.credibility + '%';
  if (percent) percent.textContent = G.credibility;
}
