/* ===== Canvas setup ===== */
var canvas = document.getElementById('graphCanvas');
var ctx = canvas.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var W, H;
var bgImg = new Image();
bgImg.src = '../assets/graph-bg.jpg';
var bgReady = false;
bgImg.onload = function(){ bgReady = true; };
var tooltip = document.getElementById('tooltip');
var ttTitle = document.getElementById('ttTitle');
var ttCat = document.getElementById('ttCat');
var ttDesc = document.getElementById('ttDesc');
var ttHint = document.getElementById('ttHint');

/* Camera (pan & zoom) */
var cam = {x:0, y:0, zoom:1};
var showAllLabels = false;
var activeFilter = null;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* ===== Initial layout: cluster by category ===== */
function initLayout(){
  var catGroups = {};
  nodes.forEach(function(n){
    if(!catGroups[n.cat]) catGroups[n.cat] = [];
    catGroups[n.cat].push(n);
  });
  var catKeys = Object.keys(catGroups);
  var angleStep = (Math.PI * 2) / catKeys.length;
  var hubRadius = Math.min(W, H) * 0.28;

  catKeys.forEach(function(cat, ci){
    var angle = angleStep * ci - Math.PI / 2;
    var cx = W/2 + Math.cos(angle) * hubRadius;
    var cy = H/2 + Math.sin(angle) * hubRadius;
    var group = catGroups[cat];
    group.forEach(function(n, ni){
      var spread = Math.min(90, 25 + group.length * 5);
      var ga = (Math.PI * 2 / group.length) * ni;
      var gr = spread * (0.4 + Math.random() * 0.6);
      n.x = cx + Math.cos(ga) * gr;
      n.y = cy + Math.sin(ga) * gr;
      n.px = n.x; n.py = n.y;
    });
  });

  /* Center hub-top */
  if(nodeMap['hub-top']){
    nodeMap['hub-top'].px = W/2;
    nodeMap['hub-top'].py = H/2;
    nodeMap['hub-top'].x = W/2;
    nodeMap['hub-top'].y = H/2;
  }
}

/* ===== Physics ===== */
function simulate(){
  var N = nodes.length;
  for(var i = 0; i < N; i++){
    var a = nodes[i];
    if(!a.visible) continue;
    for(var j = i + 1; j < N; j++){
      var b = nodes[j];
      if(!b.visible) continue;
      var dx = b.px - a.px, dy = b.py - a.py;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      var repulse = 300 / (dist * dist) * 50;
      var fx = dx / dist * repulse, fy = dy / dist * repulse;
      if(!a.dragging){ a.vx -= fx * 0.005; a.vy -= fy * 0.005; }
      if(!b.dragging){ b.vx += fx * 0.005; b.vy += fy * 0.005; }
    }
  }

  edges.forEach(function(e){
    var a = nodeMap[e.from], b = nodeMap[e.to];
    if(!a || !b || !a.visible || !b.visible) return;
    var dx = b.px - a.px, dy = b.py - a.py;
    var dist = Math.sqrt(dx*dx + dy*dy) || 1;
    var target = 70 + (a.r + b.r);
    var force = (dist - target) * 0.002;
    var fx = dx/dist*force, fy = dy/dist*force;
    if(!a.dragging){ a.vx += fx; a.vy += fy; }
    if(!b.dragging){ b.vx -= fx; b.vy -= fy; }
  });

  nodes.forEach(function(n){
    if(n.dragging || !n.visible) return;
    n.vx += (W/2 - n.px) * 0.00008;
    n.vy += (H/2 - n.py) * 0.00008;
    n.vx *= 0.92; n.vy *= 0.92;
    n.px += n.vx; n.py += n.vy;
  });
}

/* ===== Coordinate transforms ===== */
function toScreen(wx, wy){
  return {x: (wx - cam.x) * cam.zoom + W/2, y: (wy - cam.y) * cam.zoom + H/2};
}
function toWorld(sx, sy){
  return {x: (sx - W/2) / cam.zoom + cam.x, y: (sy - H/2) / cam.zoom + cam.y};
}

/* ===== Draw ===== */
function draw(){
  ctx.clearRect(0, 0, W, H);

  /* Background: photo + overlay */
  if(bgReady){
    var imgRatio = bgImg.width / bgImg.height;
    var canRatio = W / H;
    var sw, sh, sx, sy;
    if(canRatio > imgRatio){ sw = bgImg.width; sh = sw / canRatio; sx = 0; sy = (bgImg.height - sh) / 2; }
    else{ sh = bgImg.height; sw = sh * canRatio; sy = 0; sx = (bgImg.width - sw) / 2; }
    ctx.globalAlpha = 0.3;
    ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, W, H);
    ctx.globalAlpha = 1.0;
  }
  /* Dark overlay for readability */
  var bg = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H/2, Math.max(W,H)*0.8);
  bg.addColorStop(0, 'rgba(10,22,40,0.55)');
  bg.addColorStop(0.4, 'rgba(13,31,60,0.6)');
  bg.addColorStop(0.7, 'rgba(8,20,48,0.7)');
  bg.addColorStop(1, 'rgba(4,10,24,0.8)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  /* Golden nebula */
  var gn1 = ctx.createRadialGradient(W*0.3, H*0.4, 0, W*0.3, H*0.4, W*0.4);
  gn1.addColorStop(0, 'rgba(184,144,10,0.06)');
  gn1.addColorStop(1, 'transparent');
  ctx.fillStyle = gn1;
  ctx.fillRect(0, 0, W, H);

  /* Stars (seeded for consistency) */
  if(!window._stars){
    window._stars=[];
    for(var si=0;si<80;si++){
      window._stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.3,a:Math.random()*0.3+0.1});
    }
  }
  window._stars.forEach(function(st){
    ctx.beginPath();ctx.arc(st.x*W,st.y*H,st.r,0,Math.PI*2);
    ctx.fillStyle='rgba(200,210,240,'+st.a+')';ctx.fill();
  });

  /* Hovered node */
  var hovId = null, hovConns = {};
  nodes.forEach(function(n){ if(n.hover) hovId = n.id; });
  if(hovId){
    hovConns[hovId] = true;
    if(connMap[hovId]) connMap[hovId].forEach(function(id){ hovConns[id] = true; });
  }

  /* Edges */
  edges.forEach(function(e){
    var a = nodeMap[e.from], b = nodeMap[e.to];
    if(!a || !b || !a.visible || !b.visible) return;
    var sa = toScreen(a.px, a.py), sb = toScreen(b.px, b.py);
    var isHl = hovId && hovConns[e.from] && hovConns[e.to];
    ctx.beginPath();
    ctx.moveTo(sa.x, sa.y); ctx.lineTo(sb.x, sb.y);
    ctx.strokeStyle = isHl ? 'rgba(212,170,34,0.5)' : 'rgba(139,105,20,0.08)';
    ctx.lineWidth = isHl ? 1.8 * cam.zoom : 0.6 * cam.zoom;
    ctx.stroke();
  });

  /* Nodes */
  nodes.forEach(function(n){
    if(!n.visible) return;
    var s = toScreen(n.px, n.py);
    var isHov = n.hover;
    var dimmed = hovId && !hovConns[n.id];
    var drawR = (isHov ? n.r * 1.2 : n.r) * cam.zoom;

    /* Glow */
    if((n.id === 'hub-top' || isHov) && !dimmed){
      ctx.beginPath(); ctx.arc(s.x, s.y, drawR + 12 * cam.zoom, 0, Math.PI*2);
      var g = ctx.createRadialGradient(s.x, s.y, drawR, s.x, s.y, drawR + 12*cam.zoom);
      g.addColorStop(0, 'rgba(212,170,34,0.25)'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fill();
    }

    /* Circle */
    ctx.beginPath(); ctx.arc(s.x, s.y, drawR, 0, Math.PI*2);
    ctx.fillStyle = isHov ? '#f0cc55' : n.color;
    ctx.globalAlpha = dimmed ? 0.15 : (n.id === 'hub-top' ? 1 : (isHov ? 0.95 : 0.7));
    ctx.fill(); ctx.globalAlpha = 1;
    ctx.strokeStyle = isHov ? 'rgba(240,204,85,0.6)' : 'rgba(245,237,224,0.12)';
    ctx.lineWidth = (isHov ? 1.5 : 0.5) * cam.zoom;
    if(!dimmed) ctx.stroke();

    /* Label */
    var showLabel = showAllLabels || isHov || (hovId && hovConns[n.id]) || n.r >= 14;
    if(showLabel && !dimmed && cam.zoom > 0.4){
      var fs = Math.max(7, Math.min(13, n.r * 0.6)) * cam.zoom;
      ctx.font = (n.r >= 14 ? '600 ' : '300 ') + fs + 'px "Noto Serif JP",serif';
      ctx.fillStyle = isHov ? '#f0cc55' : 'rgba(245,237,224,0.75)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.label, s.x, s.y + drawR + 8 * cam.zoom);
    }
  });
}

/* ===== Animation loop ===== */
function loop(){
  simulate();
  draw();
  requestAnimationFrame(loop);
}

/* ===== Interaction ===== */
var dragNode = null, isPanning = false;
var lastMouse = {x:0, y:0}, dragDist = 0;

function getNodeAt(sx, sy){
  var w = toWorld(sx, sy);
  for(var i = nodes.length-1; i >= 0; i--){
    var n = nodes[i];
    if(!n.visible) continue;
    var dx = w.x - n.px, dy = w.y - n.py;
    var hitR = n.r + 6;
    if(dx*dx + dy*dy < hitR*hitR) return n;
  }
  return null;
}

function showTooltipAt(n, sx, sy){
  ttTitle.textContent = n.label;
  ttCat.textContent = (CATS[n.cat] || {label:n.cat}).label;
  ttDesc.textContent = n.desc;
  ttHint.textContent = n.url ? 'CLICK TO OPEN' : '';
  var tx = sx + 18, ty = sy - 12;
  if(tx + 260 > W) tx = sx - 270;
  if(ty < 0) ty = sy + 18;
  tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px'; tooltip.style.opacity = '1';
}
function hideTooltip(){ tooltip.style.opacity = '0'; }

canvas.addEventListener('mousedown', function(e){
  var p = {x:e.clientX, y:e.clientY};
  lastMouse = p; dragDist = 0;
  dragNode = getNodeAt(p.x, p.y);
  if(dragNode){ dragNode.dragging = true; canvas.style.cursor = 'grabbing'; }
  else { isPanning = true; canvas.style.cursor = 'move'; }
});

canvas.addEventListener('mousemove', function(e){
  var p = {x:e.clientX, y:e.clientY};
  if(dragNode){
    var w = toWorld(p.x, p.y);
    dragNode.px = w.x; dragNode.py = w.y; dragNode.vx = 0; dragNode.vy = 0;
    dragDist += Math.abs(p.x - lastMouse.x) + Math.abs(p.y - lastMouse.y);
    lastMouse = p;
  } else if(isPanning){
    cam.x -= (p.x - lastMouse.x) / cam.zoom;
    cam.y -= (p.y - lastMouse.y) / cam.zoom;
    lastMouse = p;
  } else {
    var h = getNodeAt(p.x, p.y);
    nodes.forEach(function(n){ n.hover = false; });
    if(h){ h.hover = true; canvas.style.cursor = h.url ? 'pointer' : 'grab'; showTooltipAt(h, p.x, p.y); }
    else { canvas.style.cursor = 'grab'; hideTooltip(); }
  }
});

canvas.addEventListener('mouseup', function(){
  if(dragNode){
    dragNode.dragging = false;
    if(dragDist < 5 && dragNode.url) window.location.href = dragNode.url;
    dragNode = null;
  }
  isPanning = false;
  canvas.style.cursor = 'grab';
});

canvas.addEventListener('mouseleave', function(){
  if(dragNode) dragNode.dragging = false;
  dragNode = null; isPanning = false;
  nodes.forEach(function(n){ n.hover = false; }); hideTooltip();
});

/* Zoom */
canvas.addEventListener('wheel', function(e){
  e.preventDefault();
  var factor = e.deltaY > 0 ? 0.92 : 1.08;
  cam.zoom = Math.max(0.2, Math.min(4, cam.zoom * factor));
}, {passive:false});

/* Touch */
var touchStartTime = 0, pinchDist0 = 0;
canvas.addEventListener('touchstart', function(e){
  if(e.touches.length === 2){
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx*dx + dy*dy);
    return;
  }
  var t = e.touches[0];
  lastMouse = {x:t.clientX, y:t.clientY}; dragDist = 0;
  dragNode = getNodeAt(t.clientX, t.clientY);
  if(dragNode){ dragNode.dragging = true; touchStartTime = Date.now(); e.preventDefault(); }
  else { isPanning = true; }
}, {passive:false});

canvas.addEventListener('touchmove', function(e){
  if(e.touches.length === 2){
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if(pinchDist0 > 0){
      cam.zoom = Math.max(0.2, Math.min(4, cam.zoom * (dist / pinchDist0)));
      pinchDist0 = dist;
    }
    e.preventDefault(); return;
  }
  var t = e.touches[0];
  var p = {x:t.clientX, y:t.clientY};
  if(dragNode){
    var w = toWorld(p.x, p.y);
    dragNode.px = w.x; dragNode.py = w.y; dragNode.vx = 0; dragNode.vy = 0;
    dragDist += Math.abs(p.x - lastMouse.x) + Math.abs(p.y - lastMouse.y);
    lastMouse = p; e.preventDefault();
  } else if(isPanning){
    cam.x -= (p.x - lastMouse.x) / cam.zoom;
    cam.y -= (p.y - lastMouse.y) / cam.zoom;
    lastMouse = p; e.preventDefault();
  }
}, {passive:false});

canvas.addEventListener('touchend', function(){
  if(dragNode){
    dragNode.dragging = false;
    if(dragDist < 8 && dragNode.url) window.location.href = dragNode.url;
    dragNode = null;
  }
  isPanning = false; pinchDist0 = 0;
});

/* ===== Legend ===== */
function buildLegend(){
  var legendEl = document.getElementById('legend');
  var usedCats = {};
  nodes.forEach(function(n){ usedCats[n.cat] = true; });
  var sorted = Object.keys(usedCats).sort(function(a,b){
    return ((CATS[a]||{sort:99}).sort) - ((CATS[b]||{sort:99}).sort);
  });
  legendEl.innerHTML = sorted.map(function(cat){
    var c = CATS[cat] || {label:cat, color:'#888'};
    return '<div class="legend-item"><div class="legend-dot" style="background:'+c.color+'"></div><div class="legend-label">'+c.label+'</div></div>';
  }).join('');
}

/* ===== Filter chips ===== */
function buildFilters(){
  var bar = document.getElementById('filterBar');
  var usedCats = {};
  nodes.forEach(function(n){ usedCats[n.cat] = true; });
  var sorted = Object.keys(usedCats).sort(function(a,b){
    return ((CATS[a]||{sort:99}).sort) - ((CATS[b]||{sort:99}).sort);
  });
  bar.innerHTML = '<div class="filter-chip active" data-cat="all">ALL</div>' +
    sorted.map(function(cat){
      var c = CATS[cat] || {label:cat};
      return '<div class="filter-chip" data-cat="'+cat+'">'+c.label+'</div>';
    }).join('');

  bar.addEventListener('click', function(e){
    var chip = e.target.closest('.filter-chip');
    if(!chip) return;
    var cat = chip.getAttribute('data-cat');
    bar.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
    chip.classList.add('active');

    if(cat === 'all'){
      activeFilter = null;
      nodes.forEach(function(n){ n.visible = true; });
    } else {
      activeFilter = cat;
      nodes.forEach(function(n){
        /* Show nodes of this category + hub-top + directly connected */
        n.visible = (n.cat === cat || n.id === 'hub-top');
      });
      /* Also show connected nodes */
      nodes.forEach(function(n){
        if(!n.visible) return;
        if(connMap[n.id]) connMap[n.id].forEach(function(id){
          if(nodeMap[id]) nodeMap[id].visible = true;
        });
      });
    }
  });
}
